body:
  text: 清正存稿别集類三宋提要臣等謹案清正存稿六卷附録一卷宋徐鹿卿撰鹿卿字德夫號泉谷豐城人嘉定十六年進士官至禮部侍郎以華文閣待制致仕卒諡清正事蹟具宋史本傳其所著有泉谷文集奏議講義鹽楮議政稿厯官對越集諸書今俱散佚此本乃明萬厯中其十二世孫鑒巡按福建于家乘中搜輯刋行者也鹿卿博通經史居官廉約清峻多惠政凡所建白皆忠悃激發不少隱諱今觀是集如都城火則上封事言惑嬖寵溺燕私用小人三事遷國子監主簿入對則陳洗凡陋昭勸懲等六事為太府少卿入對則言定國本正紀綱立規模諸事大抵真摯􅈤切深中當時積弊劉克莊以董子之醇賈生之通許之雖標榜之詞不無稍過其實而純忠亮節無愧古人固非矯激以取名者所得而比擬矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀清正存稿原序按宋史理宗朝吾家蓋有兩名卿云一為泉谷公鹿卿以樞密使封豐城男一為矩山公經孫以學士封豐城伯二公當宋祚垂亡之秋適權奸柄國之際均不得有為於時然矩山公乃理宗末季或倦於勤故不得盡其言而泉谷公正當其壯年勵精之日其言猶得以自盡登嘗從家乘中見公年譜蓋自嘉定登第以後諸凡所關職守與國家大計無事而不言無言而不盡其最著者若疏都城災而歸咎積隂之極刺其君之惑寵嬖溺燕安觸犯忌諱既言人之所不敢言其幹辦閩事也時山冦日熾所與當事往還書論動中機宜以書生而談軍旅之事又言人之所不能言至積强之敵積輕之楮二者當時急務而人槩諉之無可為公獨奏之未已又白之廟堂必欲起衰救弊于萬一又言人之所不及言乃輪對二劄言尤激切至謂以越王勾踐之規模用今日東南之天下庶乎其可使人主竦然動色則人之所不可言者而亦言之其忠悃何篤摯也公之疏札固不止此而此其大者當時不免見忌至纍乞祠而獨西山真先生與之契合其舉備獻納也則曰學術精深節操方正其辟知南安也則曰才識不羣强毅有立至謂求以答民望而寬時憂則示以吾黨道同志合之意語云道不同不相為謀同聲相應同氣相求公于西山儻非其道之相為謀而何聲應氣求之若是哉蓋公之從事于學也壯年嘗立青雲社約友朋輔仁于㑹文之外及仕而教授南安訓諸弟子由濓洛以溯洙泗之源故公之立朝寧與逐客俱退而不與諂子同進其守制寧違審察之旨而不肯冒起復之名此其平日之所得于學問者深故其所契合于西山必有出於言語行事之上者在也世多訾儒者迂腐不適于用以公之儒而其言鑿鑿可用若此劉克莊稱其有董子之醇賈生之通信不誣矣嘗讀西山大學衍義見儒者經世之實用則其所取于公者豈徒迂腐云爾哉此公文字之可傳非區區子弟之私蓋於儒先之言信之也時觀叔以按閩過家命録出年譜中諸疏札將與矩山公集並刻以傳夫泉谷公欲為于猶可為之日故其言詳矩山公欲為于不可為之時故其言略此前人一時之雙美也其並傳也固宜登忝逺裔竊願蠅附故述梗槩以引其端云徐即登拜手謹撰清正存稿原序
