body:
  text: 清正存稿巻六宋徐鹿卿撰頌詩明堂慶成頌并序洪惟聖宋十有四葉皇帝御極之二十二年所以培髙浚深襲休垂鴻以對於神祇祖考者蓋已素矣乃季秋之月將有事於明堂逺維成周嚴配之文近稽皇祐一王之典蔽自聖心奉寧考並配鉅麗偉特焜煌翕赫臣民咸曰休哉先三日列辟造廷奏啟齋宿有語於門者曰上自朔旦茹蔬止酒矣既入有衛士相告曰上親禱于天章閣矣及時將祭冠佩咸集侍班南廡下有閣門老院舉手加額忻然診于衆曰上明禋凡七然景氣澄晏無若今夕可謂與天地合徳矣聞者莫不動色相慶臣因伏惟夫㣲之顯誠之不可揜如此皇帝端居法禁一念所發而天地鬼神臨之都民走卒誦之迄禮之成百休昭貺臣於是知流離盜賊不足憂外夷敵國不足平乖氣可消和氣可格特在終始此一心爾臣幸得以職事周旋爼豆間與觀盛典而又叨侍經幄許得以文墨自見謹撰成明堂慶成頌一首凡二十四章章四句冐昧繕冩以聞雖詞理淺薄不足摹繪日月之光然情意所在亦㣲臣拳拳忠愛之義云其詞曰穆穆聖皇出震乘乾二十二載如日中天大祀有彛親享凡七嚴父配天昉自今日逺稽前載其在成周皇皇宗祀奕奕垂休近㕘家法有若皇祐一祖二宗於焉並侑時維秋季涓吉中辛本以忱敬秩以儀文皇在原廟推迹本始錫慶儲祥仙源演迤皇入太室祼獻必躬列聖在天時降于宗皇升玉輅齋莊中御一塵不驚六飛如舞皇登陽館幣玉交陳五位時序徧於羣神相維辟公耆俊布列珩璜鏘鳴籩豆豐潔樂既具奏佾舞工歌八音克諧兩間浹和秋空無滓萬里一碧璧月珠星瑞光浮溢忽焉低垂非煙非雲若降若接郁郁紛紛肹蠁潛通受胙飲福移班紫宸嵩呼三祝祭澤下流肆𤯝端門雷雨既作草木皆春人曰吾君兼旬蔬食孰知陟降常在帝側人曰吾君精禱天章孰知明徳日薦馨香凡皆可為天不容偽眡此休嘉豈其力致一念之善神人具懽朝野傳夸中外鎮安流民可綏夷狄可滅天且弗違人誰敢越前星必耀年穀必豐人所同欲天寧弗從侔徳周成儷美仁祖於萬斯年受天之祜若古有訓明命難諶雖休勿休惟單厥心我將不作臣竊其義請誦末章夙夜祗畏明堂慶成詩并序恭惟皇帝陛下自登大寳至於淳祐八年禋祀凡八方詔旨初下靡日不積忱致欽申飭攸司期以對越是歲秋仲將有事于明堂而零雨其濛罙日未止上憂形玉色弗懈益䖍先事歴吉祇告原廟起視霽色澄湛景象清穆既謁太室衆以燠潤故疑懼旦而玉輅徐驅揚鸞鏘鳴成禮之夕碧空無雲明月在地儀節叶度樂舞之奏神靈顧歆内外懽悦上心怡愉下至奉璋執爼之臣以至三軍萬姓之觀禮望幸者填溢充塞翕然同辭莫不忻然相告曰丕休哉我皇懿徳純敬上對天心下符人心亨運重開昉自今始將至於萬萬年無斁臣幸得備數法從目擊盛典不勝踴躍贊歎謹拜手稽首綴成慶成七言長詩一首凡二十韻仰効歸美之意且以寓箴警之萬一云塵滓太清臣下情惶懼戰灼之至詩曰聖皇歴服萬斯年今搆精禋第八畨配合二儀嚴大報侑兼三后有常尊純心實徳期先盡縟典彛儀匪漫繁淳祐本因皇祐制民心所欲聖心存季秋肇卜中辛吉旦氣深憂宿靄昏罙月齋居忘肉味寸丹靡日不天閽俶臨原廟清風穆既駕鑾輿曉日暾明徳馨香非黍稷真機軒豁露乾坤髙空不夜天澄湛大樂同和景晏溫福祿穰穰綿帝賜本支奕奕慶文孫誕敷解澤傳鷄赦環列臣工肅駿奔河海晏清成鉅典神祇安樂衍璿源無前休美方揚厲持敬工夫重討論武帝中年惽内慾明皇晩歲異開元願將英斷充剛健早正皇儲立本根駿骨廣求來冀馬烏巢不毁集庭鵷長存鯁亮為元氣痛絶隂柔杜倖門肅正紀綱强國勢細分臂指鎮侯藩微臣何幸逢熈事奏雅終篇罄瞽言執㦸從官今老矣華封祝壽報君恩五言湛泉送客二絶句吾生如寄耳嶺阯又三年政自歸心碎那堪送客船其二中年懐易惡更聴斷腸聲多謝兩榕樹逢人管送迎䕶法寺勸農呈秘丞出郭囂塵逺勸農徳意宣旌旗清賞地蓑笠嫩晴天犬吠柴門曉牛肥草徑鮮殷勤觴父老和氣釀豐年贈曾司戸君家螺江頭我家劍江邊千載㑹相望飲水同一川朅來古梅關相識春風前髙義軋層漢清譚響幽泉努力效徃哲勿為時俗牽詠蘭叢蘭抱幽姿結根托山壤所據良孤髙其下俯深廣雲氣接清潤雨露從資養雖然翳深林未肯逐衆莽輪蹄紛紫陌誰此事幽賞幽賞縱不及香風自來徃酬正錄直學二首我生愜幽尋訪古梅花邊道原𣺌無際滄海滙羣川仰之歎彌髙立則參於前為山始覆簣掘井當及泉端期㑹真意可但窺陳編冄拜禮雙趺清風生誦絃其二劍水望梅關山川接鄰壤前哲餘典刑多士徳心廣曾子重而厚朱張妙存養吳子粹而雅筆耕懲鹵莽有友五人焉亦足共清賞烱然玉韞櫝持此將安徃酬衆士友二首行歌有妙趣聲滿滄浪邊岱嶽宗衆山渤澥傾百川今人悉闇投無因難至前古人貴漸進有本如原泉周程不可作三歎撫遺編正音𣺌難聽蛛絲潤鳴絃其二大鵬息天池蚯蚓潔槁壤吾儒茍自適心與天地廣受之不為㤗鍾鼎備榮養挽之或不留林野歌浪莽陶詩浪莽林野令譽妙文繡片言榮爵賞物理有乘除大來斯小徃次曾司户見貽之韻併餞其行聞道常苦遲生世何用早洛學此開端文義富論討髙山勞景仰内鏡㡬囘照此心同古今一理該衆妙和黎丞梅闗嶺峭壁接髙天閒雲淡横嶺稍便僧房靜未覺官曹冷風月兩閒人山川一佳境誰與共此樂老仙白垂領判府羅郎中舉似快閣佳篇輒次嚴韻此菴湖海士心學富家傳徳量擎天柱功名下瀬船風流今尚爾頭角已嶄然蚤晩分清切輸忠雨露邊輓陳太庾二首前身簡齋老今世令河陽眼底功名小胷中書傳香清談了公事餘力到詩章鳬履今安在清都侍紫皇其二一病成疎隔琴堂入見時形癯已非昔客至尚談詩手墨松煙濕聲歌薤露悲春風誰管領前賀生日詩語梅月重相思再遊梅關書呈黄幹雲邊大庾嶺嶺上一叢林送徃迎來路升髙望逺心年華今復古人事古猶今惟有關門石相看嵗月深次黄幹梅闗韻二首老盧行法地千載復抽關崖石横雙翠禪機滿一班兩泉涵定慧半榻卧雲閒著我談風月真成出世間其二相逢白蓮社失脚過前溪野興雲横浦禪心絮著泥梅花大庾嶺鉢石古招提擾擾仕途夢從前幾箇迷廬陵書院次陳明叔韻西風下黄葉客裏上新愁許我聨舟渡從君借箸籌坐縻三月久寛作兩旬留聚散一塲夢邯鄲鼻息齁快閣書呈吳宰千里江章路登臨獨此雄清波長夜月落木又秋風浪芷浮花外盟鷗狎鷺中詩魂蘇醒在千載豫章公丙戌年新春偶成新年十許日才有一篇詩鄉思風中亂春心雨裏知病緣衰驟至懶與睡相宜暗思泉溪上杜鵑啼故枝感興二首吹竽媚所好乞墦厭其餘邇來效尤者徃徃拾芥如其二浮名豈不榮遺道亦安忍君看趙孟徒千古同一盡春日地冷春無力野晴天有功芝蘭傲幽谷蓬藋長東風政以身為患非關詩得窮且求吾適意敢擬衆人同小英石峰舊作英巖隠今為庾嶠行雖然一拳許有此數峰青崷崪驚凡目堅剛悖世情墨卿相指似只尺是蓬瀛送太庾黎丞二首老矣黎夫子拳拳只此書萬緣俱淺澹一字不遺餘庾嶺風煙句石溪雲水居無人知此味説似子非魚其二客懐秋易惡送客更當秋薄宦相從久孤征肯暫留酒輕離思重目短大江流黄菊聊持贈寒香晚不羞次瀛父詩青山闖門户綠竹窺簷楹巋然一亭石境界涵幽清李侯昔經始扁以横浦名亭前兩泓泉吞吐寒蟾明方圓中規矩曲水相紆縈汲溉當瓶盎觀覽駢簪纓黄君靜者徒道號靜寄磊落千人英朅來梅花邊一見眼為清官居亷泉上復此逢清泠詩豪㵼銀漢興逸凌紫京回首聲潺潺恍如醉翁亭林判府和前韻見示且約暇日論茗次韻為謝昔我觀西湖碧瓦䕃丹楹冷泉一泓玉占斷錢塘清南來泝西江灘以十八名出門訪亷泉醉眼增雙明平生山水性不著塵俗縈佳處輒留憩竟日陪衿纓薄宦落横浦師友皆豪英尋勝得湛泉古甃莓苔清上有石崖峻下有沙水泠韓沙水光泠也近可俯貢川謂亷泉也逺可企吳京謂冷泉也為公飲春茶日日來新亭府判再示楹字韻詩再和之别駕寳横道冷官槁代楹誰令塵土姿近映氷壺清君家閩山陽泉以䝉著名家有䝉泉平生養正功炯炯心地明我家古泉溪四顧巖巒縈蜀道難百步九折縈巖巒日迂長者轍來徃紛振纓湛泉偶趨風漱液咀流英張衡思𤣥漱飛泉之瀝液兮咀石茵之流英古榕憩隂隂綠竹哦青青泉鳴似喚客盈耳清音泠陸機文賦音泠泠而盈耳歡謠動海隅溫詔來宸京只今遊覽地囘首真郵亭出灘賦灘石嵳峩聶都山豫水兹發源始者才濫觴其流細涓涓東行介南埜章水西入焉又東漸雄張有州故名䖍貢水逺來赴融合為贑川當其初合時泓渟匪為淵中通尺五流玉虹卧蜿蜒羣山來左右萬石梗後前初疑牧羣羊忽訝堕飛鳶伏犀狀魁傑浮鴈影接連阿河陣敢死赴浴池連錢下者宛蹲踞上者將騰騫或矯首欲鬬或宛留安眠或退然深伏露尖大如拳或竦然特起儼立髙齊肩或兩兩為偶或伍伍相連此有一席平彼有萬竅穿齒齒漱寒洌眼眼開青圓形模互馳騁氣勢相吐呑平坦十數丈變怪紛百千顧盻不暇給算數疇能殫天公轟震霆力士推雷門上下相舂撞對語不得聞衆灘角巇嶮四灘獨稱専其一曰天柱竪立如登天幽深下無際渦盤矗迴旋其下為舞索風柔飛翩翩絶流迤而東虵蚓相縈牽大了與惶恐殆見伯仲間輕駛疾於箭號怒沸若煎下此得安流袵席過舟船我生若萍梗薄宦遊梅關三載兩經過每過心為寒酹酒問長江胚胎始何年胡不事夷易而樂從險難江神信靈異恍惚若有言吾來卜居此肇自開混元清兮伏塵滓介如抱剛堅一片朝宗心萬折無變遷所樂在兼濟未始間愚賢征人閙憧憧鷁首浮翩翩吾力所能任登岸常相先雖然有觸齧自取非吾愆清獻昔疏剔不露斧鑿痕至今虎城下滚滚流遺恩坡仙逐海南為世所棄捐風帆一葉身詩句萬口傳灘石本非險人自以險看委蛇曲折間道徑自平平子行但由中坎窞居其邊子舟要適平輕重防其偏乗流亦良便避礙須達權五湖瑩如鏡瞬息風濤掀嬉笑或藏怒至愛存笞鞭灘石信非險險處却萬全我聞説是義心思俱豁然一笑過灘去落照銜山前雜興六首荒凉横浦郡頗稱冷官居為甚更清睡冬來不讀書其二梅花亦何寄偏便幽人愛清寒風雪夜一枝靜相對其三竹枝雙翡翠縮頸照寒水驀見渡溪人一聲忽飛起其四庭蘭尚牢落庭草已勾萌草與蘭何似東風亦世情其五豈不謀數椽吾力苦未足破屋儻支撑尚堪燈火讀其六學詩不能神得句常草草儻可寄吾懐豈必人稱好月夜赴郡會歸輾轉不成寐觸事感懐庾山髙入雲章水清見骨山髙晩宜梅水清寒浸月美人天一方雲烟妙空濶帶月簮梅花獨起舞殘雪其二槎牙兩榕木偃蹇江之濆雖縁擁腫廢幸免尋斧斤東家不鳴鴈喑黙存其神事固不一㮣鴈烹木長春其三連雲峙華屋東隅滿荆棘延縁耗地利狼籍窺空壁一朝火燎原根枝蕩無迹蔓除亦可喜火烈憂轉劇其四騎獵似為業養鷹如養兒人言鷹玩兔主翁鼎鑊之玩信不忠九死固其宜萬一疑似間羣鷹驚欲飛賀判府生子西江最上流南安古名城庾山蔚然秀章水瀏其清異代得偉人分此風月平徃者程伯溫關决錚有聲煌煌萬金産炯炯雙珠明四海名父子一門佳弟兄造詣極洙泗叩擊鏗英莖流風已百載今日復一程提屏東方來寛令孚羣甿名門衍餘慶蘭玉添新榮山川萃神秀穹垕儲精英仲律青陽熈五夜璧月盈天上雙麒麟剛欲逐隊行抱送者釋氏協夢兮長庚昔為程氏子俱以斯道鳴今為陳家兒岐嶷由天成覔公洗兒錢我不學世情期公愛子深視厥程先生器質待涵養門户須支撑會看三世間接踵當巨衡七言之官過贑灘二首玉局詩中惶恐灘聞之已為骨毛寒那知舞索并天柱二灘尤險更向前頭作怒瀾灘聲嘈雜怒轟雷頑石參差撥不開行客盡言灘路險誰教君向險中來雨霽報謁見一鷺得魚羣鷺爭食之二首一鷺翩翩􅅖釣磯隔汀羣鷺已知機空將辛苦供羣吻畢竟貪魚罪有歸履險窺魚得幾何傍來攫取較多多爭如歛翼餐餘粟猶在人間潔白科壽曾僉判二首漸報星橋鐡鎻開遊仙失脚下蓬萊一番春色歸桃杏半吐歌唇獻夀杯陸地新開萬朶蓮綵雲擁出幙中仙傅巖已入春宵夢火急排雲叫九天和杜子野湛泉詩來詩有塵事分清事之句榕隂漠漠俯清泉泉澑涓涓不計年未必塵紛敗佳思凭欄得句却天然子野又以詩來言不畫涪翁畫李翁再和之太守一時留恵愛詩仙萬古自清風尋常藻繪初何記終是人心記此翁聞鴉有感鵲羣饒舌本何功鵶陣狂言却似忠聞鵲忻然鵶輒唾甘諛易售古來同容齋續筆言北人以烏喜而鵲為凶讀楊妃傳六宫粉黛溢三千一箇中間寵愛專自此世情生妄想推排妃子作神仙世俗見明皇溺愛貴妃遂指為神仙中人妃固非不美而未必真冠代也徒以六宫之衆無一當意獨妃得以專寵故想像其不可及世間事如此者何限詎止一妃也哉曾氏清江亭想得當年月浸扄諸公翰墨此縱横亭荒久矣詩無恙一道長江萬古清有無垢澹菴真蹟杜子野寄雲山蘭石四畫且以近詩來和韻酬之二首石瘦蘭馨入骨寒筆端徃徃帶儒酸河陽桃李春風滿此段煩君更畫看愛君標格碧峰青為輟床頭竹葉瓶想得醉餘鋒頴健羣鵞端欲博黄庭和杜宰送茶韻誰遣持書晝打門茶魁有句牧之孫牧之云茶為瑞草魁煎調還我西江手水茗相投自不渾又韻月團不遣貢脩門却寄書癡閉户孫若把蕉坑分品第濬功端合遜王渾杜子野惠來禽内碧桃謝以一絶五色雲箋到冷曹更將菓實飽詩饕便應譜入來禽内青李刋除著碧桃子野惠竹􅔺有感而賦二絶形如虎大極肥玉局詩中曽識面小山書後忽題名鴟夷混沌俱慙遜更勝河豚太瘦生坡仙云鴟夷讓員滑混沌慙瘦爽食根為􅔺肥腰腹食竹根鼠也食實為凰長羽毛同是此君供廩餼居然地位判卑髙七月二十一日重過贑灘十絶句矯矯雄張虎欲奔低低蹲伏鴈成羣丁寧莫礙行舟過喚作長生萬石君其二初疑萬馬立沙汀又似臨流簇戍兵激怒灘聲能許劣終宵長泄不平鳴其三漱崖嚙石出竒功浴月涵風淡蕩中過者千㠶閙如織會心知有幾人同其四乗居山徑若﨑傾舟渉飛湍石膽驚等是危途休計較此心無礙盡堪行其五北來快順一篙駛南去間關百丈牽世事從來且如許下灘船看上灘船其六嶺海脂膏自古傳至今來徃共長川川靈有眼還知道幾箇歸人月滿船其七江清端可樂調飢險處行人盡得知平陸波濤良叵測險中却自是平夷其八聞道春江㶑灔時灘平如掌棹如飛何時滿却葵丘戍流水桃花送客歸其九十八灘頭一葉身山川曾識舊詞臣詩魂百載猶蘇醒應笑風波解戱人其十儲潭初發未朝餐一日經行十八灘不似來時推不進吟詩把酒傲驚湍廬陵試院次陳明叔韻曉看窓影過飛鴉短髪蓬鬆一半斜兩月不遊真瘦却夢尋庾嶺訪梅花梅花舊傳庾嶺梅花好及到梅關少見梅惟有一般差可信南枝長占小春開觀釣熱猶造請褦襶子老未知休矍鑠翁立懦亷頑今幾見桐江夢想一絲風府判社日招飲蔣園座中索賦詩三絶句玉妃圍坐簇娉婷勾引陽和媚徳星洗盡凢花脂粉氣月香亭是雪香亭城西好事主人家走送天香國色花嶺阯三年才見此便應奴婢命山茶栁絲搖曳春風裏山色空濛社雨中領畧韶華􅂸一醉巴歌聊爾效南翁再續前韻鶯谷聲喧雨乍晴邦人引領望屏星陽和一氣元無際小為尋花到野亭荷囊清白舊傳家來看溶溶月下花不似尋常殺風景也宜飲酒也宜茶筆端鸞鳳詩千首社下雞豚酒一鍾九十日春今强半典衣還憶少陵翁依前韻呈府判城南煙雨趂春耕遙指屏星是福星肯學晉人耽燕樂只因脩褉會蘭亭占籍蓬萊第一家勸農蒔稻莫蒔花時和不但歌華黍牆有柔桑焙有茶發舒生意烟花外醖釀豐年雨意中關決郡條知有助故應千里化文翁月香亭主人送以牡丹座客作芍藥品題翌早知其誤二詩謝花勿怪也素粧芍藥萬花王葉未全舒滿國香醉眼瞢騰渾不醒虎賁却似蔡中郎其二玉容當配水仙王壓盡羣花不敢香晝困未甦酣宿雨也疑湯餅試何郎愛山堂七絶句并引愛山堂大庾之西館也始名裕民繼超然近世浚儀趙君為令始易今扁南安居嶺北環城大抵皆山而面勢局隘以偪惟斯堂對五侯峰太平山圍繞於後如簾幙中坐達觀疎林前横溪流映帶一佳處也自有堂以來幾世幾年而未為山著語豈囿乎形氣者有遇不遇山之與人固無以異乎抑造物者祕此竒觀將有待而發之與今令君史子束不鄙謂余盍賦之因綴七絶句呈似余詩安足以發越造物之竒觀亦姑以慰此山之寂寥耳寳慶丙戌夏季二十日横江江上四山環少得當前面勢寛試上此堂舒逺目疎林盡處見峰巒其二大峰舒肆小峰崷簾幙中間坐五侯立斷斜陽吟不透一聲牧笛滿林秋其三竹籬茅店野人家門外青流一帶斜小隠桃溪端的是更須水上覔胡麻其四比屋桑麻三月雨夾溪桃李四時春誰歟幻出山前景指似堂中覔句人其五自有堂來三換扁官居賢否只山知酴醿嫵媚今何許山色青妍宛舊時圖志云裕民堂荼䕷成架其六客問主人今暇否主人心與水雲閒庭空吏散文書靜茗椀熏爐上愛山其七坡谷經行久品題顧令迂拙强摉詩雖然何世無坡谷山立孤髙好自持贈琴士翁明逺併簡幹教二黄丈鍾期不作伯牙死琴墮雲烟蒼莽中翠玉樓前幾識子山風吹散又西東去歲遊翠玉翁琴未至予先去莫恨吾琴難入俗俗人不聽韻方髙秦筝耳畔休拈出韶石亭前走一遭詩自曲江來靜寄琴中適意吟魯菴句裏自然琴琴詩若要清如許千古寥寥覔賞音我亦能琴妙不傳無琴無譜併無絃客來問訊琴安在指似孤鴻落日邊章貢三咏并引寳慶乙酉仲冬既望鹿卿歸自螺川靜寄主人黄瀛父檢法黄丈司理李丈檢法趙丈鈐幹吳丈相約遊鬱孤訪洞天入崆峒道院觴客于衮衣葺纛堂酒半登紫翠玉樓用覽山川之勝瀛父不鄙謂余不可無以記之因成三小詩呈似且以志諸君子眷禮之渥云羣山湧浪翠周遭中峙層臺氣象豪萬里闕庭長在望定應天眼照孤髙右鬱孤臺崇山脩竹小蘭亭人在雲烟深處行環立千竿了清絶中盤一徑巧紆縈紛紛鴈鶩庭堆案擾擾蠅蝸市有聲洞裏道人忘底事小橋西畔句初成右鬱孤洞天夢跨長虹海上遊寒生肌骨一壺秋好風吹得詩魂醒自寄雲間翠玉樓右翠玉樓上判府陳秘丞斗大山州枕上流蓬山仙客此遨遊讀書竹屋公多暇樂業江郊民有秋泮藻叢邊深長育嶺梅香裏費賡酬有人來問和羮味太守忘言一笑休向來一榻下南州此事無傳閱幾秋顧我風流非孺子乃今天幸事王侯頽波甚矣誰能返砥柱巋然好鎮浮喚起東湖風月夢請為榱桷備兼收酬溫户見和首篇南來冠葢總名流契合全忘是宦遊清甚夜寒金井露瑩於霜曉玉壺秋梅關景物詩陶寫蓮幙風流酒勸酬只恐烏羅留不住漢庭山立看揚休酬陳太庾二首從來令尹職承流君亦牛刀嶺阯遊和氣滿城桃醉雨仁風四野麥先秋陳𤣥譜在交逾固毛穎功多賞未酬撫字勞心古如此不須為米便歸休英聲獵獵滿山州翠剡飛來鶚在秋父母視民非俗吏子男分土列諸侯篇詩捲送驪珠爛杯酒相從蠟味浮不必即人人即我定知瑚璉合當收酬何學賓二首商山黄綺信清流自合相從鶴禁遊鄴架爛觀三萬軸莊椿行老八千秋髙懐莫遣羣兒覺佳句那無半語酬我亦諸侯老賓客更將墨守問何休昔聞鼻祖在揚州詩句清於玉露秋奕世相承忻有後在家還復勝封侯觀頥義熟靈龜見祝壽杯深緑蟻浮丹鳳休銜丹詔下黄冠已懶待黄收酬曾學録王掌祠二首夫君砥柱屹中流也肯來為泮水遊好句上摩周雅頌褒詞榮過魯春秋髙山忽奏音逾古美玉深藏價未酬捜遍枯腸難論報江淹聊欲擬揚休去年射策古杭州來到梅關嵗已秋徳薄豈堪儀衆俊貧軀聊復客諸侯一窻燈火味清苦四座風流酒拍浮弟子無非樑棟用先生未必副先收酬張録南老二首詞源輕寫峽江流曾蹋槐花月裏遊梅嶺詩篇一甌雪芹宫書策四山秋明珠小借枯崖潤美玉那無善價酬再戰定穿三汲浪絲鞭席㡌拜新休生長西江帝子州蟪蛄强欲語春秋溉根正喜逢張籍拾芥寧堪擬夏侯冷淡工夫千秃飄零蹤跡一萍浮自量只合山林住烏幙如何也見收酬張直學二首漳水元通劍水流朅來庠序得同遊自從快踏梅花雪一洗從前茆瘴秋官况我今忘獨冷鳴聲君合起相酬龍光自有張華識句不驚人未遽休平生久願識荆州落落參辰幾度秋下榻有誰知孺子運籌端合屬留侯吟成春草夢非夢跡漾風萍浮自浮見説桂枝消息近廣寒清徹片雲收酬吳直學二首滚滚詞源峽倒流飄飄擬上廣寒遊一編芹泮挑燈夜兩捷槐花得意秋賸喜文盟堪共結忽驚詩債未曽酬數能相過徵奇事肯學淵明遣客休慚無健筆敵蘇州蝸蚓聊鳴子夜秋問樂定應從季子尋盟自許長滕侯佇看騰達飛黄去小共徜徉大白浮㑹有雞林識風雅一詩端把百金收酬朱直學二首儒官領袖得名流子佩應無在闕遊只要松筠耐霜雪須知蘭菊自春秋年齡五十當榮顯風月三千足唱酬揚善推能需叶贊有容心地儘休休南來草木半炎州喜見氷壺一段秋所學有原真父子自前無種是王侯傳家肯羡金籯滿用世還知玉璞酬人事盡時天理見但勤耕耨候豐收酬楊直學二首人生遇坎與乗流入則藏脩出則遊風順鵾鵬須擊海時來蟋蟀自吟秋教經已勝金籯贈遺錦慚無玉案酬著脚蘭臺自今始懸知下筆不能休四海聲名揚道州亭亭心幹凛髙秋耳孫自是干人傑骨相當為萬里侯春入草堂清夢透名登桂籍暗香浮錦囊正恨新詩少説與奚奴取次收贈太和曾機宜故家名姓塞乾坤曾上歐蘇涑水門似此髙風寧幾箇至今流澤到諸孫談詩江上風烟圃訪我梅邊竹石村尚有典型堪世守㑹看溟海化鵬鵾壽陳太庾壽山輝彩照湖山管領春光又一畨動地名聲太丘長傳家詩派簡齋孫梅關信息羮調鼎桃縣風流酒滿尊里社逢時公事在好施竒計復中原去年修褉後三日得南宫捷報於家今年是日與同年趙簿同事泮宫感而賦詩淡烟疎雨杏花天回首春光又一年月桂香中方並駕嶺梅隂裏競揚鞭覺來始悟他人夢著罷傍觀國手先一動靜間知造化吟情渾寄栁絲邊趙簿見和復次韻一昨瞻依尺五天青衫槐簡是同年飛騰影裏尋芳躅警蹕聲中響靜鞭夷路已看騰驥駛競風須遜畫蛇先宗臣底事猶棲棘有䇿籌邊不在邊酬黎丞見和極目龍門峻接天仕途傾蓋便忘年太平官府閒吟竹勝處園林笑舉鞭松栢凌霜知獨後樓臺得月㑹居先老臣憂國誰能識飛雪飄飄上鬢邊酬曾教正襟懐瀟洒浴沂天家學相傳幾百年外物莫貪蒼玉佩真才肯賈蠟黄鞭不平未用鳴東野懶讀難為誚孝先賴有濓溪衣鉢在滿庭風月浩無邊酬正録直學横浦雖然一角天周程清化幾經年從前歩武堪同轍近裏工夫好著鞭自笑已居王勃後相期常恐祖生先地麟自此符佳䜟魁宿聨輝庾嶺邊酬何學賓笑傲壺中别一天徳人端合享耆年鳴鳩不栩堪供杖老驥馳思詎假鞭儀表特居終賈上名聲突出勝王先熊彲已入佳占未明月清風渭水邊去歲王監嶽以詩餞行且求無垢語録次韻送之我來横浦訪遺言無垢先生有正傳雙跡凄凉城下寺一書洩露性中天向來富貴俱荒草今日風流尚湛泉東谷有人知此意平生恥售蠟黄鞭和張直學送新茶韻夢繞康王酌水簾不知身世宦東南蘇仙忽餉蕉坑品子上渾凝曉露甘便遏鼻雷醒睡思仍澆舌本發清譚捜枯破悶功神速數到盧仝椀兩三壽提舉陳秘丞二首南極星高月一弓天將好事慶仙翁朝中詔遣鮮于使境上民爭正獻公葵藿傾陽清瘴霧旗幢蓋海颺薫風梅關南北俱和氣祝壽歡聲兩處同昔在興隆歲甲申文恭當軸秉鴻鈞陳文恭公隆興甲申再相如今休運重開宋指日熙朝再相陳㑹有勲名償小戊肯將官職怨雌辰百年盛事看層見請頌中興嶽降神再用前韻送地圖光武帝輿地圖正甲申歲炎運中天嵗甲申誰令漢鼎重千鈞故家輿地傷𤓰裂真王城樓細指陳今古一時如合劵明良千載慶逢辰來年竹帛功名就圖繪雲臺筆有神至梅關書呈僚友栖迹梅花嶺下州梅闗未到已神遊右江左廣山分水薄霧輕煙雨作秋物是人非一今古南來北徃幾公侯就中認得禪機者非錫非泉是道不士友見和七月七日曝書依元韻謝之寒儒家世派南州天遣芹宫並俊遊劍水章江千里月天孫河鼓一畨秋曬書舊事聊同郝聨句新聲恐類侯隔嵗槐黄頻入夢曾知山角已生不送周幹送客章江庾嶺邊試將行止問蒼天雖然刖足終全璞尚有知音莫斷絃仕路偶來雲出岫歸装何有月隨船鼠肝蟲臂㝠心久一笑掀髯對湛泉郭府判書友于堂榜謝之以詩鳥篆開端不露鋒錐沙成畫體逾工中間三到屋漏雨此後仍傳壁坼風羲獻以來名絶學徽章之外更明公朝天此去承清問一片丹心筆陣中堂礙雲霄扁友于黑蛟光射斗牛墟細筋入骨藏稜外妙手師心灑墨初只為忠誠珍栁筆多因節義重顔題知君清徳光前古發露毫端直緒餘廬陵曾省元求書見杜宰和韻餞其行夫君漸是買臣年恥炫虛名賈蠟鞭斗酒新豐無飲伴宫袍采石詫詩仙寒花傲節休嫌晚蟠木為容不假先更上詩壇㕘杜甫清譚相對紙生煙三山周省元索詩依杜宰韻賦二章一以謝杜之貺一以贈周之行清夢蘧蘧楚峽陽來書頗有思家之興鎔成句法味悠長栽桃小試經綸手泛菊聊澆錦繡腸逸思已堪凌賀白高懐贏得傲羲皇此中真趣人知麽愛酒陶潛不是狂其二閒呼斗酒醉斜陽欲説還休此話長笑我平生窮到骨羨君萬巻富撑腸向來一見梅初白别後重逢菊正黄潘縣主人如下問為言不減向來狂林府判録示近製依韻和呈二首竒寳寧容棄道傍名藩贊理令飛霜冀都便覺羣空馬魯市應無詐飲羊嶺阯雲烟新入詠天邊日月趣依光吾民疾痛誰醫得好試家傳已效方冷宦趨承木向陽窺斑良覺愧真長摩挲千里紅塵脚浣滌十年新學腸小節自期氷皎潔高吟滿聽月昏黄青蠅附驥從兹始底用行歌效楚狂用羊字韻呈史君曾揩醒眼奕棋旁松栢孤髙耐雪霜西蜀捜竒到金馬南邦頌徳繼羔羊梅邊生意傳春信筆底新詩燦夜光運動樞衡當接踵小煩千騎上東方侍林府判齋宿舉似頃在海陽縣齋丁祭詩依韻即席和呈文星今夕照儒宫多士青雲路已通沾溉有原芹泮水吹嘘無際杏壇風温醇德意覃千里教飬規模肇一同疇昔周程鳴道處鳶飛魚躍化鈞中府判和答依韻上呈芹藻生春水繞宫吉蠲祠祀意潛通燈花飛舞看簷雨詞藻清新繼國風貳政坐令千里化論文賸喜一樽同彬彬執爼鳴鸞者盡在明公和氣中䕶法寺勸農呈史君半載分符江水西幾曾一日事遊嬉忽聞千騎傳呼曉正是三春勸相時父老倚鋤聽號令兒童騎竹望旌麾東風歸路歡聲滿野草閒花索賦詩史君寵和復依韻上呈禾生隴畆自東西父老怡然市井嬉列郡幾人知此意五風十雨盡如時買牛已解田間劍分虎難淹嶺下麾一任吏人來報事不妨遊戲作春詩同日依齋宫韻呈府判屏星小駐梵王宫草碧泉清一徑通細細秧針抽夜雨盈盈麥浪汎東風登臨不為溪山勝守助端期井里同此去豐穰知有兆百年父老笑聲中寄題胡叔軫香山樓詩并引鹿卿年二十三時得忠簡公斥和議書讀之竦然起敬持姓名質于長上則曰此廬陵澹菴先生也忠節為南渡冠因盡告以公生平出處之詳鹿卿服膺至今嘉定十七分教横浦乃獲敬讀公詩文而觀其遺墨未幾公之孫叔軫榮赴經從遂得瞻識故家典型宛然是似越明年北歸欵語益密出示名香山樓詩鹿卿載惟胡氏香山之名今烜赫如星日而白傅洛中之香山已久湮廢可歎也叔軫伯仲方有大名於時必將成忠簡之志使洛都復入職方而兩香山與冠霞同垂不朽可也鹿卿以自㓜景慕忠簡之心既覩其詞翰又識其後裔之賢詎容以燕陋為辭輒賦唐律一章聊寫是意非敢言詩也笑問香山似舊邪風流宛是更詞華由江距洛路千驛諸公詩多引匡廬香爐峰事故云以宋繼唐詩一家今日重簷窺斗柄向來遺址面湖沙莫忘先世規恢策贏取芳名並冠霞忠簡樓名史君贈所臨蜀本三蘇入京圗詩以謝之至和嘉祐正塗開綵鳳將雛出蜀來父子名聲天宇小弟兄筆力海潮迴岷峨一氣鍾三傑歐富諸公識異材後百餘年拜遺像凜然髙節尚崔嵬黎丞傳示史宰聾字詩走筆和之毛穎翻成一秃翁文章苦欲誑盲聾從前結實無非妄勝處生涯好用工天上髙深關守虎馬前奔走背生蟲榮枯數定何須問了却公家是奉公再和聾字韻詩一謝史宰一呈黎丞化感兒嬉七十翁波餘猶足活瘖聾肯安恬退淡中味大覺催科拙處工及物坐看馴乳雉蘇民更欲罵尸蟲恢恢游刄渾餘地贏得賡酬伴贊公唐人呼丞相為贊公見太白傳脩齡閬苑一仙翁拜跽無妨豈是聾松栢耐寒宜歳晩池塘入夢洩春工羣趨摘尾渾行鷺一見降心賦草蟲莫謂田園動歸興渭濱垂老尚三公林府判和前三蘇圗詩再依韻為謝蜀道山川鬼斸開文星屢謫北中來凌雲賦客邀難住捉月仙人喚不迴坡穎與泉同一姓漢唐比宋孰多材公詩狀出眉州畫元眉州本不學香山詠馬嵬張法示詩集為題其後聞名每恨不相識相識梅關眼帶青雪榦冰姿披宿霧銀鈎玉唾麗繁星居憐山谷傳宗派系出燕公有典刑陶寫風光吟咏了更培勲業照青㝠次韻史宰賀受薦玉立清規照眼新封侯端合踵平津公車久滿三千牘屬國猶淹十九春來書自喜登第十九春一覩雉馴知善政雙飛鶚薦媿陳人焦桐會有知音在未必終為㸑下薪送何生龔生歸曲江肯為從師出嶺來三千子亦可人哉文章要似風騷體學問非為利禄媒泥迹尚留鴻爪在雲程已報鶚書催儀型只在鄉關近前有張余後有崔和南康趙簿贈詩瑞世詞章響佩琚過人學力更充餘盤空紫氣難藏劍照坐青藜趣校書已脫塵埃辭矮屋還將清泚映汚渠雲霄此去功名逼詩酒生涯莫作疎次史君喜雨韻併呈府判明公閔雨志平民祈禱無他只一真萬里天髙隨感應半空雷震忽亨屯挽回庾嶠生生意化作商霖處處均歸斡元功調玉燭從今三過續絲綸次史君喜雨偈韻并引未雨而禱雨此心之敬也既雨而喜雨此心之愛也躬行者愛敬之實也政事者愛敬之推也祠祀者愛敬之寓也詩歌者愛敬之發也曰敬與愛大人之事備矣此盛徳之徴而鹿卿之欽慕焉者也繼嚴押而賡之所以寫其欽慕之意蕪纇之弗羞則恃有宗匠斤斧在也朱轓臨涖甫經秋已報民庸總若疇賸有心思圖恵養更無毫末事誅求操存對越神明久應禱旋銷旱魃憂天意念功殊味别且將甘露畧相酬田里懽傳嵗有秋已占休證叶龜疇連朝霪雨忻從欲一念通神只反求暫向嶺邊宣主澤每先天下為民憂藩方久袖為霖手百萬蒼生願未酬追挽監簿李公誰將偽學涴忠良滿眼脂韋時様粧敢斥𢎞羊蘇歳旱始驚鳴鳳見朝陽生前運蹇官三品死後流傳紙一張前輩遺風今寂寞狂歌聊復弔清湘送表伯朱丞尉瘴嵐窟裏抱琴歸髭鬢青青只舊時人道器之真鐡漢我疑方朔到瑤池從前日月忙中過此去山林分外宜晩嵗栽培無别計萬金良産在孫枝十年踪跡兩相望邂逅崆峒喜欲狂見説橋成鞭巨石忍看水駛舞歸艎面無慚色言何恤民有遺思味最長故國蓴鱸勞夢想從公鷗浦弄斜陽黎丞命飲辭之以詩湛泉問訊十分春安得搘笻踵後塵不是稽山無賀老定應坐客畏陳遵鳬飛渤島姑容我馬繫堂階解笑人重約蕉坑新茗熟一鷗相對話情親為曾僉喜雨隔年亢旱到初春才掛征帆雨浥塵諒得靖共神所介更留約束後來遵今朝南浦悲行子明日陽闗憶故人老我滯留歸未得斗升全為白頭親史宰見和依韻為謝巧釀河陽滿縣春居然盡洗簿書塵桑間馴雉誠為異渚畔飛鷗祗漸遵良玉自應求即我明珠寧肯暗投人冷官竊笑詩情淺無計能令子建親依韻戲呈諸丈雲萍邂逅總青春意氣飄飄足絶塵酒有盈樽聊共醉食無重味恐難遵是日有不許用猪羊肉之令浮生百歲風和月官路連年我送人自此彈冠知有喜莫言非故亦非親再呈曾僉去去榮觀上國春幾人竚立望車塵如星於北常懐拱自海而南不必遵初欲去南海遊簷雨挑燈三益友錦帆載酒一詩人勲名自致男兒事莫倚金張肺腑親諸公約㑹縣中觀燈不克赴既又見趣座中賦一章上元花市明如晝良㑹應知臭味同自笑無殽似坡老豈能載酒過揚雄是夜不及攜具寒盟如我顔生赤燒燭輸君坐照紅莫憶遶梁聲未斷且將詩酒謝春風即席次府判韻梨園勝日問春光細細飄來滿院香色縞半空天與潔花翻六出雪呈祥月華巧幻溶溶景風韻偏宜淡淡粧深夜霓裳欲飛舉篝燈何惜共徜徉興教寺勸農呈史君自從􅃎雅無傳後漢有龔黄宋有羅夙駕朱轓勤勸相奉宣黄紙放催科一犂烟雨郊原曉千里春風嶺嶠和看取便民橋下水滿江濃緑漲恩波挽安人陳氏節義千年一緹縈復因緩急見髙情風霜凜凜欺行役天地昭昭監此誠羞藻敬恭宗祀重空花了悟世縁輕歸時認得來時路暗想蓬萊是故程别倅車聖朝疎網示寛平鞫讞煩公六月行穿屋可嗟嚚訟險持衡只在此心明蘇寃去釋五原旱了事歸看快閣晴檢㸃舊遊章世美甘棠蔽芾滿江城餞羅使君二首聖朝選表作公卿如此才猷合要津上亦知公能體國心乎濟物不謀身梅花嶺下忽千里荷槖班中添一人民願借留留不得多應留與十分春西鄰有女出深閨十二樓中奉盥匜大徳愛憐知有造小心莊肅但無欺請為公祝千年壽恥學人填半額眉舊著衣裳今好在芳心暗逐錦帆移令佐約登息梅嶺不克赴次來韻撑空一嶺鎮東隅未遂登臨且按圖城雉崢嶸歸眼界徑蛇盤屈透雲衢句中風月天無盡物外亭臺山不孤令佐才髙當辦此稍容拙者自嬉娛坡云才者不用拙者娛喜雨上史使君馮宫講平田秋水髙潺湲大府寛條俶布宣不旱猶應言有旱省諐敢自謂無諐倒翻雲外菩提水幻出人間擺栁天阡陌曉來傳好語作霖人在嶺梅邊湛泉酌餞黎有詩壁間遂次其韻幾人林下賦歸休公獨翩然汗漫遊味道不妨寒似水入時須用曲如鈎從來鄰父皆邀去底事官曹挽不留後夜相從那復得月明千里故山秋壽馮宫教三首己卯十二月初六日丑時子月陽從律管囘剛明鍾聚濟時材出當聖世千齡㑹小為横江百姓來生意無窮倉有粟春工不擇地宜梅從今拈出經綸手吾道輝光壽域開文星照耀大江濱春色無邊上藻芹千載魯宫覃美化百年洛學嗣清芬但同南國歌申伯敢效東坡壽夘君子由己卯生誰謂廣文官舍冷眼前突兀厦連雲公占金華寳婺纒我生劍氣斗牛邊雲山闊逺一千里歲紀參差三十年初度漫言同日月榮枯相去異天淵香山不鄙兼謩少名節當參九老傳送游同年赴增城征官踏雪南征靡憚勞此公端不為錐刀能行所學官無小茍利於民譽自髙鞭算何須窮孔穴荆班且共説風騷吏姦民蠧渾閒事臨政先教立脚牢再用韻君行嶺海獨賢勞我念鄉闗折大刀心事有如江水白誼風端共庾山髙理財只合從周禮飲酒何妨讀楚騷客至無氊相諒得請將詩句當共牢次宫教六齋慶成韻二首魯侯脩泮幾千年盛事相符易地然夏屋渠渠高揷斗誨言歴歴煖於氊簡編有味芸香細風月無邊草色鮮樂道簞瓢亦人耳安居何憚士希賢邪傾枝拄費三年革故圖新有待然凌雨千間駢紫佩濓溪一派寳青氊韶鳴已覺俱忘味鼎養何妨更擊鮮師帥作成真有道詵詵弟子信皆賢宫教再以詩來復次韻蚤負才名四十年胷中成室總天然承流且建偏州學談道終分廣厦氊椽筆發揮春藻麗鸞旂照映雪花鮮幾人魚躍鳶飛下黄巻生涯對聖賢陳府判邀遊梅關庾嶺蒼蒼古復今公餘杖履愜幽尋兩崖峭壁風霜骨一片清泉佛祖心靜浣世縁揮酒椀更添春色上梅林㝠搜翻學詩情拙滿眼皆詩祗用吟勸農上宫教竹馬兒童喜欲狂循良太守似龔黄倉庚百囀蠶桑啓布谷一聲稉稻香耕饁盡陶􅃎國化遊嬉已遍舜民鄉文書便合登髙閣為説東郊入務忙時改比屋鄉為舜民鄉中秋對月有懐前年今日文闈裏鏖戰紛紛酣萬蟻去年歸去浙江頭塵滿征衫未曾洗今年又對梅花嶺日味虀鹽翻故紙乾坤一季兩中秋閏八月兄弟三人各千里南安至豐城一千里豐城至江夏一千里伯兄恍作期年别夏口武昌幾山水季弟秋初辭母去去日不堪重倒指孔懐一念我既然伯季念吾亦如此天涯海角𣺌相望蓬轉萍浮無定止古言秋月只愁人人自關心何預此隂晴圓缺嵗復嵗離合悲歡固其理何時當有二頃田歸卧雲山漱清泚烹茶煨栗對秋輝老穉團欒相爾汝此心烱烱明月知一醉狂吟聊復爾詩成鄉夢透泉溪人物山川亦良是殷勤多謝桂花風忽遣清香喚人起溪泉命客并引五月二日餞蕭使于郊道遇史黎二丈言瀛父有湛泉新詩而未見因口占溪泉客一篇繼逢曾僉幙於小溪遞示詩本凡十一韻因併和之湛泉泉水鏡様明清溪溪水玉似清是中風物俱可人一塵不到世累輕詩家者流脩水裔筆頭春工不擇地川君水靈聖得知爭遣酒兵互招致泉聲似喜嘉客到㶁㶁琴鳴徐弄操兩榕傴僂巧逢迎萬竹敲鏗當呵導清溪忽走間使來言傳號渙驅風雷鼻祖校文遊覽舊對壘者誰人姓栁山谷考試南安有贈栁朝散詩是夜瀛父亦為倅車邀去清溪閣不及竟湛泉之席故云百年遺事償可徵今夕尋盟一盃酒客聞斯言但唯唯熊掌固竒魚亦美賞心樂事古難并到此如何决行止凭欄㑹意夢非夢止者靜兮流者動嗟嗟此水真吾師去流皆可隨所之揮手謝泉歸路晩風雨瀟瀟溪上舘明朝收拾入新詩兩處溪泉皆意滿獨坐長江釀碧山滴藍書堂枕北户啓南無人與言畧為二邀月對影聊成三澄清萬慮了無據漁獵百氏幾如貪觀蘭玩石亦何好平生嗜好有所耽沈煙紛郁醒宿醉松風清越供幽談反觀靜照黙有契森然衆理俱包涵羈窮紛紛歎荼苦真味徃徃如飴甘客來問訊主人處春風軒下榻睡酣春補掲牓史君為詩以農諭學次韻為謝東郊前日勸農民泮宫今日勸諸生勸農直欲使家給勸士詎止隆鼎烹新詩隨寓有規益筆勢滚滚今長庚芹藻生春鵠袍肅聽説筆耕同鐡耕情田鋤治付編簡儒藻溉灌須陶泓善根深培恐未固惡念痛絶猶潛萌因農諭學良切至一理通貫昭然明下民蚩蚩每難悟不勸安得千倉盈讀書為士豈待勸勸且弗勉真炫名本然之天我固有踐履須踏實地行要知為仁在乎熟本無内外無將迎嵗猶有歉道常富士實為重農為輕賢侯之文菽粟味雖出遊戲皆真情居窮勿但作魚蠧官逹還戒專蠅營信能行此乃有獲不負魯泮鳴鸞聲清正存稿巻六
