body:
  text: 清正存稿巻五宋徐鹿卿撰文復齋記士莫病於過莫善於復非過之病過而不能復者病也何謂復人欲去而天理還也夫人之所以為人者以其有是理耳彼其旦晝之梏亡是五隂之剥也平旦之清明是一陽之復也復而固之其為臨為泰也孰意復之者甚微而梏之者反覆則夜氣不足以存夜氣不足以存其得為人矣乎人而欲充其所以為人之理則毋恥於過毋吝於改過無過則無復復者過之反者也非必曰一言之差一行之失而後為過也理即心也心即天也使吾胸中所存揆之於理微有一毫之不相似則過矣過則必知知則必復復則必固固則與天為一矣是故一念之悖于理者皆過也一念之還於理者皆復也復非自外至也惟能不失其初而已子路之復有過喜聞子張之復篤敬書紳曽子之復日三省吾身顔子之復有不善未嘗不知知之未嘗復行方其過時鏡昏於塵及其既復塵開鏡明然而諸子之復復於既愆顔子之復復於未形莫非復也而遲速之間又有間焉此諸子之所以為諸子而顔之所以為顔也耶若夫小人之為不善動於心形於色發於聲音未有不自知其所由然者過而曰不知與夫知而不能復者是欺心也欺心即欺天也天可欺乎是故君子貴復天地復萬物生人心復萬物明士而志於徳其必自復始矣當復而速復既復而固復其顔之徒乎西昌倪公孺粹而和清而文以復名其齋而屬余記之故余樂與之言復之理公孺儻有意焉是則復齋記矣嘉定甲申季秋既望種徳堂記南安置郡幾三百載其間鴻儒碩師以徳善著者有六先生焉明道伊川則以侍太中公攝倅事而至焉者也東坡則經從而憩焉者也元城無垢則遷徙而寓焉者也唯濓溪以辦分寧獄事用當路薦來為郡司理受知於太中開理學之源見諸行事尤為顯著故郡雖偏而是職視諸曹特重方先生在官時與部使者爭重囚不獲則置手版欲去曰吾不殺人以媚人竟免囚於死自是繼武者民必以濓溪望之故地望雖重而稱職為難非難于稱職難於為濓溪也金華徐杲明仲繇賢闗職科第再轉為郡理官政成課最上有日矣扁其堂曰種徳詩以自見而委鹿卿記之其有濓溪之心而溯其原於臯陶者乎夫兩賢相望經歴幾世而以徳為刑其心一也善種徳者必先定吾所以種徳之地臯陶之欽恤濓溪之中正地也地立矣凡而偏怒竒憐蟊吾種者也有一於此皆徳之累去其累深其種明以本之恕以繹之亷以培之剛以耨之學以豐之則徳盛仁熟而難者易矣雖然是不可以朝種而莫穫也昔禹稱臯陶之徳而稱其邁言逺也漢于公為决曹乃侈大其門以蘄隂徳之報夫處斷平允决曹職耳而其言如此則公之種不既鹵莽矣乎臯陶之意濓溪得之以為濓溪而于公或未之知也明仲涖官有能聲又即徳名堂以詒其後于公幸子孫之貴而明仲永免子孫之憂可謂善學濓溪者矣今理㕔象先生而祠之凡在此位者暗室屋漏微有慊於吾心則入而居於堂出而拜於祠必有不安焉者矣此明仲名堂之深意吾故表而出之寳慶初元六月七日記雲封禪寺重修造記大庾五嶺之一也踰横浦而南陸行十餘里山行五六里盤廻繚曲躋于嶺巔界江廣之交石壁對峙是為梅關關南寺曰雲封六祖大禪師之法區也自漢元鼎庾將軍戍闗而嶺始名自唐開元張曲江公刋山剔石而關始通自咸亨六祖得法而寺始創青山流水環屋上下蓋嶺嶠清絶處也世言大覽傳衣法於黄梅以歸僧徒追躡爭之至是師置衣盤石上追者不能舉及卓錫地間泉踴出後人即其地為寺大宋祥符庚戌始賜今額中間寺宇興廢紀載失其傳莫可考詰至於今老屋暗腐住持永清勇猛精進必欲自我一新之以誠告當路聞者傾施則鳩工庀徒踰越險阻輦材於三百里外中為祖師殿東為霹靂泉亭南為靈官殿西為西閣又西跨山兩崖梁空為僧堂翼殿之右隔歧道面東為官廨扁以駐節髙明軒豁罔不稱事剗攘菑翳幻出金碧役始於嘉定癸未成於寳慶乙酉縻緡錢二千有竒惟法堂方丈尚仍固陋亦且銳意經度凜凜向就矣清自武其功走南安城謁記於郡文學南昌徐鹿卿以紀嵗月余嘗試語清曰昔祖師樵採負薪以足衣食比其服勤碓下密契無上菩提言下了了本無一物當是時萬境皆空室廬政復安在一向從末法中作佛事於祖師意云何清曰妙莊供誠非我事然自我之居是山數十寒暑矣車之入乎關者不知其幾千兩也車之出乎闗者不知其幾千兩也我從其後而問之其人勉於職者勤於政者心於民而不敢茍者則人必曰此賢者也才者也其或養蠧敝偷嵗月媒身而職之弛甘利而政之荒則行路非之甿𨽻仇之夫吾教本于無為而或以有所為見譏子教職於有為而或以無所為見疾孰知道無精粗無人我無内外無為而不為有為而未嘗為孔與佛不相悖也子亦觀諸嶺上之梅乎如是而生如是而華如是而實如是而落謂之有所為可也謂之無所為亦可也能具知識於其有無之外則道在是矣余於是竦然驚豁然悟因嘆曰魯男子善學栁下惠永清善學祖師乃今日獲聞第一義諦因次叙其説使歸刻之以諗後之出入是關者俾無愧於嶺上以貽清之笑云落成之嵗六月朢日記雙碧柱記教官㕔之東有樓三間曰導月嘉泰壬戌曽侯凖建㕔北堂五間嘉定辛亥方君季仁建樓後堂之左為屋三間面東兩峰扁曰雙碧寳慶丙戌徐鹿卿建屋前築臺從十有五尺衡倍之扁曰月觀觀之前為圃中累土尺歴四尋植以雜花木既就而鹿卿去惟㕔事創於慶元丁已隘且敝材嘗具矣而役弗及幾來者圖之丁亥朔日記重建六齋記寳慶二年秋七月宫教東陽馮公特卿守南安始至環四封之内屬耳以聽令公百未暇問既祗謁先聖先師則進誨之顧視齋廡卑敝喟然太息以為待士之道有所未稱即捐錢廿萬繼之以粟俾儀更造鹿卿稟命而退以事聞于繡衣户部永嘉陳公畏公亦曰此宣風化者事也况吾故治其可無助予錢如郡之數時左史撰太師三山鄭公性之攝漕事聞之亦助十萬度費浸具則經營鳩工掄材給直與民間等委職生分董其事悉撤故而新之不足則益以學糧錢七十萬有竒米石百又不足郡帑再益錢十萬而鹿卿亦稍出俸廩以佐費對列六齋齋建爐亭為位廿四總一百六十楹百爾器具罔不飭齋之扁曰進學近思貫道尚徳時升上達以九月經始越四月告成已乃外剏櫺星門外葺養賢堂庖廩向背各易其所規模雄偉視昔加倍士喜且奮請為記鹿卿不得辭惟昔周程先生講道是邦軌範森然可敬可仰而養士之宫因循日入于壊頽簷老屋弗支雨風講明切磋之功為希闊其責宜有在也維時良二千石以學校為重部使者又相與出力主張之豈真為觀美哉古者上自天子之國都以達於術於黨於家莫不有學使之羣居族處相觀而善㑹異而同之故士之為善者衆也王教不行人自為説家自為學無師友以講㑹其文義開廣其心胸下者為儀秦髙者為楊墨波蕩流溢冺冺棼棼其閒居窮守獨以自力于善者宜若有人然亦有安之而不變者縁有司無以興起之耳今六齋既建廊榭靚深牖户明敞硯席之味隔於塵坌饔餼之供愈於簞瓢傳道有師考古有籍於是藏脩於是遊息一叩擊間有圓機焉一領悟間有神化焉夫亦可以自勉矣學者其毋負朝廷作成之賜歟夫伊洛開端肇始之意異時卓然自立如古人以經義治事名齋而勲名節行與齋俱傳是則士之職也亦三君子之望也明年春正朢記福州請雨記紹定壬辰夏六月不雨至於秋七月徧走羣祀未效大帥番陽李公以石鼓閩重鎮其下衆水所滙必出雲為風雨乃命屬吏南昌徐鹿卿致禱丙申詣寺齋宿丁酉黎明登屴崱禮畢而雨是夕大雨戊戌又大雨已亥雨止槁者蘇涸者流刻而識之侈神之休右記刻于鼓山大頂峰𨽻書在朱文公天風海濤四大字之傍白太守論南安縣試選事淑民心非難變民習為難西蜀在漢以前有蠻夷風不齒於中土文翁為守及脩起學宫招下縣子弟以為學宫子弟髙者補吏次者孝弟力田每行縣益從諸生與俱又遣詣京師受業博士吏民榮之由是大化至武帝時卭筰不通遂遣司馬相如乗傳往使竟能略定西南夷以歸自後如王褒揚雄嚴君平彬彬繼出而蜀郡安治者累年至先主遂倚之以抗吳魏是知民之習變則民之心始可恃也横浦三縣惟南安最為僻逺民居深山窮谷間與溪峒雜揉賢士大夫足跡之所不到其民非因詞訟不至州郡所見者獷戾之風爭競之事耳雖有秀民亦徃徃淪沒於其中每嵗本縣不過春秋二季差官往大傳寨招為士者而試之以場屋之文一日而散如此而欲變其習誘之為善莫若倣文翁之意令本縣每嵗縣庠及大傳寨春秋補試務寛其選諭其樂於從學者不限員數倣秋闈勸駕之禮集縣官飲餞之而給其道里之費遣詣郡學受業其成人者則隨經分𨽻學諭教導童子則處之小學而委教諭職之校官時進而誨之以禮義之大端彛常之大訓如有所學優異及月書季攷入等之人則州郡亦稍加旌别其登第者則與之陞甲而兩預鄉舉年至四十以上者得比廣郡詣廣之漕司銓量權攝在廣州縣官其正奏特奏人欲於廣定差者皆得眡二廣例使之知儒學之為榮而漸銷其豪横之氣一旦或有暴戾之事則令其鄉人請舉入仕者化諭之如相如之於蜀庶乎其情易孚而坐得其要領如是則禮義之習成而可以為不叛之地矣論待敵救楮二劄上樞密院竊惟今天下事夥矣其尤重大者非寒逺疎賤所敢儳言而通國指為急證者有二曰積强之敵也積輕之楮也而敵之視楮尤急請先言之夫敵非能為吾禍吾實自禍耳竭事力以挑勁敵之怒導蟊賊以養背脅之疽遂使變起蕭牆憂關宗社而君臣上下未聞有斷斷一定不易之謀前有一誤而莫之懲後有二病而莫之救將何以為自立之地哉何謂一誤聞之道路朝廷陽雖諱和之名隂有向和之實廟算𢎞深必自有説豈非以邊城已破器械已空兵糧已竭不得已而為權宜之舉彼其盤據荆襄者為兵為盜未可知也使敵誠欲講和果兵邪必能引而去之果盜邪必能掃而清之還我舊疆受我歲幣而吾因得假歲月之暇為葺理之圖藉令它日不免寒盟而吾之家計立矣邊臣之所以主和朝廷之所以向和意或出此而國人之論則不然謂以為當中原雲擾之時敵去我凡幾何里沙漠遼絶歳帑當於何而交道里梗塞使介當於何而進是以未論和之不可保已憂和之不可成而主議之臣曽不察此所遣間使更往互來支犒之數動至盈萬嵗月墮於𣺌茫之計帑藏耗於非泛之供今其效亦可覩矣萬一敵盛兵以臨我假和以紿我我不能戰而復紐於和則是甘蹈金人之轍也可不懼哉何謂二病一曰規模不立昔樂毅下齊七十餘城齊以不支之勢一舉而盡復之惟其無一念不在於復城故卒無一城不可以必復厥今立國東南以荆襄淮蜀為屏蔽棄襄者棄荆之漸棄荆者棄淮蜀之漸也方城漢水我所必爭縱未能收功於目前亦豈宜遽置之度外而在邊在庭志氣消索襄閫一跌則以墮甑目之邊城一失則以土梗視之荆州之孤注甚㣲兩淮之風寒孔棘至蜀則又甚矣處日蹙百里之時而悠悠舒舒不異平日雖不顯然為畫江之言而已隠然成畫江之勢識者之憂不在荆襄而在淮蜀矣二曰謀慮不孚越人之謀吳也舉越國同一報復之心吳之謀日㿽暌而越之心日益叶勝負之機於此而决今强敵之衆中原之盜逆全武仙之餘孽尅敵王旻之叛卒皆叶口一力求以快意於我而回視吾國則上無勾踐卧薪嘗膽之志下無種蠡分治内外之忠朝廷之意不白於天下邊帥之意不孚於同列江淮之閫各自為謀上之人調娛委曲惟恐咈之其何以當百勝之敵哉為今日計謂宜懲一誤去二病大作規畫以守易和密為收復荆襄之圖中寓聨絡吳蜀之勢北兵吾讐敵也一人一騎不可復引而置諸大江之南邊民吾根本也虐征重斂不可復横出以竭其生生之理練兵擇將備器峙糧盡心力而為之事㑹之來豈有終極一州可取則復一州一邑可圗則復一邑然後遴選邊豪以為守令又擇嘗仕於邊諳練事體者與之㕘稽假以便宜優其事力而舉前日所儲之兵糧器甲以實之俾得紏集兵民且耕且戰為效死勿去計是所謂守者將以守吾祖宗疆圉之限非畫江而守之謂而戰在其中矣政使敵情無饜則將移吾之所以守備者與之戰戰勝而後和則和可久而後禍不作矣夫七年之病雖已錮而三年之艾猶可求不求則終其身而不可得某愚不知兵然䝉恩稟議宻府故敢陳其管窺之見如此惟廟堂賜省幸甚第二劄某既陳待敵之説矣請繼言救楮之説夫楮之所以輕者以其多也吾既無見緡可以用官價而大收之則當有權宜之術以救其窮而拘常之論必欲以一換一曰吾不可以先自輕楮而失信也不思以一換一則猥多之數略無减損不過易舊為新改換界分而已何以能使新界之必重哉且楮之始行非以楮為錢以楮飛爾其官價七百七十未嘗一日變也自輕楮以來民間隨其低昂入以此直則出以此直初不為病受其弊者獨朝廷爾二稅之數無増也祠牒官告之直無增也征商牙契之人無増也及其出也市物之直增矣戍兵之生劵增矣諸軍衣糧雖如故而非時之給犒増矣官吏正俸雖如故而添給之暗增者亦不少矣利權通塞命脈繫焉而上之人曽不察楮多之由思所以省嗇而澄其原方且揚湯止沸日益滋甚夫興師十萬日費千金然猶曰是特一時之費也兵息則費息矣若至守城臨軍喝轉資給一嵗增添支賜為數浩瀚蓋將終其身而後已兵事不解則資給愈多其將何以為繼然猶曰是非吾之得已也蓋有得已而不已者矣如添差員額一二年間增剏凡幾州郡有三數除授而未定者送迎憧憧靡耗甚廣且它冗費難以徧舉既不能節其出又不思革其弊問之則曰是無策也可乎夫所謂權宜之策者使百姓以髙價受而吾以低價取不可也無害於民而有傷於國亦不可也茍無二者之病則就短而求長宜亦可為矣今外方楮價率止二百二十金近畿雖有三百之名然皆虛增物價以當之實與外方等爾竊謂十六十七兩界斷無復昻之理宜有以殺其大勢别造新界而凖時價之實以一為三權與舊楮並行所以然者恐新楮印造未多爾凡官司支遣新楮則一千當七百七十舊楮則三千當七百七十民間二稅入納除一半見錢外其一半官㑹並須㕘用新舊新楮則自如常數舊楮則以三為一謂如納稅二百千其一百千見錢自無增損一百千官㑹合用新界五十貫用舊界一百五十貫通凖一百貫願全用新楮者聽惟折絹折麥之價似聞以舊楮之低頗有增數却許分明具申别與裁損其它入納凖此所納舊楮盡以解發若有出於合解數目之外者則用新楮償之亦以一而當三如此則楮之數三分殺其二矣有一分新并楮行止是殺得一半用後說收減則是三分殺二矣然造新頒降恐其數未廣又當用救急之策以漸殺令之監司州郡凡有樁積交承常平等錢去處不問名色不限多寡各出其半以收舊楮每貫以二百四十足為定價合三貫計之為錢七百二十是亦以一收三之異名也用實價則官吏不至牟利而為貪有常價則官吏無所增損而為姦每路委有風力監司一人主其事先考覈一路之錢共可以收㑹若干既以收兊則旬一具數申聞朝省而以兊到舊㑹分限解發焚毁務在必行俟新楮之價増計各處兊過錢數撥楮發下填償元來窠名而又有説以終之收楮之令既下凡祠牒官告之在官者皆止而未售見錢將既然後出令曰舊楮之頒凡若干數今已收及七分矣自餘三分無從盡得見錢收買從某月日為始民間應有十六十七界㑹盡用以買祠牒官告舊來祠牒每道八百貫今凖實直合用二千四百貫官告亦如之並未用新楮此令一出則有舊楮雖欲不准祠牒官告之求不可得已兩策並用相為扶持數日減而價已增豈不愈於束手坐視乎其間條目猶可細議其大要在於减殺爾雖然權宜之策亦非可以終恃茍不知塞楮出之原則多止十數年少或三四年弊復如前矣繼今以往凡可以耗吾財計者謹之重之是又救楮本原之論上廟堂論楮鹽書某投閒窮谷外事無所預知其得于耳目所接有可以上助聽聞者非因附遞無由登徹今之大計惟楮與鹽米而已鹽價之窮不知者專咎朝廷其實固不盡然然朝廷何暇與百姓分説兩月以來江西舊楮收拾幾盡價增至百九十矣新亦與之俱増此浮鹽之功而大丞相救内弊第一事也楮於是可扶持矣存舊所以扶新减舊所以扶舊舊于何而减曰當取十七界腐爛甚多揉而為紙而存其堅完者以當小㑹遲之數月二百之價可以次增舊之增即新之增也第有利必有害苦於食淡者江西湖南為甚然救得楮弊則暫時之害勿問焉亦可也抑古人有言若弓之張誰能弛之官價増重豈朝令實然自軍將州郡夾雜虧減而又取盈於是積而至此所謂疑似致謗是也某前所議浮鹽以為價愈髙則私販愈爭必使官價小平而後私販自止比見違禁者魚貫于路深有望朝廷思所以為彌争之道私牘公文言之詳矣嘗䝉下賜鈞翰以為邊事息則罷之有以得丞相之心矣不諗今嵗邊儲糴本如何若二事已定則自大丞相行之自大丞相弛之使天下曉然知賣鹽所以收楮則正大明白孰不愜然心服皆將謂經綸老手所以開閤斡旋者有非常情所能窺測豈不甚盛美矣乎江西早禾僅爾中熟晚稻未保其往六十萬之糴為數已多亦須以早降本為先出位僭越等祈鈞察青雲課社序已夘之春其月建寅其日已亥青雲課㑹十有七人集于里之崇元觀以文㑹也酒才數行殽核具而已卒飲相顧言曰朋友之㑹尚矣蘭亭之集以脩禊㑹别墅之遊以圍碁㑹竹林七賢以放達㑹酒中八仙以沉醉㑹朋友之㑹尚矣而以文㑹者寡也惟吾鄉里之士平時過從聚合言論鯁鯁如藥石矧當天子詔興賢能郡諸侯勸駕之秋蓄銳待敵正其時矣可不益圗切磋之功乎此課㑹之舉吾徒所以相長而求益也凡與此㑹者不以技過者必知所裁而未及者必知所勉也不以齒長者毋至於亢而少者毋至於憚也不以分師生得以相正親戚得以相規而兄弟子姪得以相指摘也言而失則約之中行而失則返之善其所以輔仁者又有在於㑹文之外也豈直曰綴緝之工而絺繪之巧邪噫嘻尚敬之哉尚勉之哉於是同辭而歌曰彼澤相滋兮流長彼蘭相襲兮幽香維朋友之好兮亦澤麗而蘭芳廼賡載歌曰諱過兮不藥之膏肓專固兮自伐之斧斨維朋友之益兮尚瘉疾而起傷又歌曰青雲坦其路平桂窟藹其風清維朋友之慶兮當攜手而同升歌畢乃命徐某次而叙之以為識且條列事目而附諸其後云白太守論立限撰勸農文竊惟上自朝廷下至郡國設官分職大意畧同天子之尊不親細微則其代王言者有翰苑有中舍諸侯之重不屑細務則其代翰墨之勞者有舘客或以委屬吏之能者等殺雖殊其體一也夫今朝廷之出命其事大體重者則有鎖宿若其常事則許退而譔述未嘗律之於期㑹之間也是非私於代言之職以朝廷之體當然耳郡文學之視衆寮等為屬吏而事任差省則夫嚴之期限責之遵禀誠未為過然州郡平時所以優假之者每事稍異詣府而許之升車莫謁而許之預座非私於文學也以州郡之體當然也且均是人耳今日為中舍則不律之以文法上而為文昌為侍郎則簿書期㑹豈能盡廢今日為郡文學則不限之以常程再任而為幕職為縣令丞則簿書期㑹夫又何辭由是言之其所以稍加優待者直以在上之體當然而不為下者設明矣有如軍府之尊嚴責一屬吏為至易之事茍其力之可為一頥指之奚敢不力非如它官財賦之不可必辦獄訟之不可驟决而至於臨期誤事者比也今皂胥不照與簿書吏事一例行移在某么麽之蹤非敢驕蹇慢令但所在少有此例恐後來承襲不改繼至者以為破例非體自某始自判府始區區之意竊謂承命而行即是遵禀不必先次具申然後為稱所有勸農文謹已譔述隨劄繳申欲望明諭所司此後或有使令遲速惟命不必如簿書獄訟之例况善政垂成歩武日髙在某趨風之日尚多儻畧於為郡文學之時而嚴期㑹於它時奔走之日則始終無非效報之地區區冐死不任悚仄祠真文公祝文嗚呼先生百世之師偉然泰山喬岳之氣象灑然光風霽月之襟期即微言奥理而深索處暗室屋漏而不欺以同胞同體視民物之衆以至公至誠結旒冕之知其操履如金石其議論如蓍龜善類所倚以為宗主權門所不得而招麾清明見信於奴𨽻姓名至誦於童兒蓋親接乎考亭之緒又將沿伊洛而泝洙泗使天假之年則必措世於唐虞之雍熈惟昔駕周原之駱適值江左之饑非特蠲逋已責以為惠而又捐金貸粟而繼之非特殫寸心之懇惻以挈其綱領而又羅九州之俊以効其驅馳慮於已者無一毫之弗盡切於民者無一事之不為請於朝廷者為五十餘萬之廩粟脫乎溝壑者不知幾千萬户之黔黎視后稷之由已真可對越若汲黯之開倉又特其細微某偶以弱質承乏計司仰先生之髙躅兮匪門生之敢企矧嘉熈之歉尤甚乎嘉定之時官無可發之廩國無可捐之貲人倫天理且至此而幾熄菜色雷腹徒坐視其顛隮亦嘗呌乎閶闔迄何補於毫釐於此而後知仁人之盛徳浩乎浹髓而淪肌至今父老尚言之而感泣名筆紀載偶於是而獨遺昔有不言使虜之績獨自喜乎活青州之饑先生蓋嘗仗漢庭之節諒此心與前哲而同歸謹倣祀忠宣之遺意用敢掲遺蹤而並祠某適有共二之役行解授代之龜命屬妥靈矢心致詞庶㡬秉史筆者之有採抑以慰甘棠無窮之思横江雜稿序韓退之不肯著書謂其為也易則其傳也不逺欲俟五六十為之冀其寡過予才不敢望退之萬一則雖終老未可以著書况未五十六十乎自來横浦三年凡見之一二諸文大抵出於應酬之廹非著書傳逺也士友不予鄙請刻梓以傳蓋屢請而屢辭焉辭之力則梓之私甚矣愛而忘其醜也既成以示予予曰盍毁諸或者囅然曰工不工才也傳不傳理也過而刻之是蠟市人之鞭也過而毁之是碎仇池之石也鞭不可蠟石不必碎子姑求如退之者而折衷焉予曰諾因書以識趙司戎詩集序昔余讀六一先生送東陽徐先生序其詞典以正其意閎以深未嘗不歎君子之愛人以徳也及來横浦司戎趙君時舉一見如舊交間誦其為文沛然如决川東下雖龍門砥柱横扼其衝而不為避噫亦銳矣于後交益深情益洽每寮友㑹輯則論人物短長賦詩歌談江浙嶺海間竒勝事可駭可愕無能發一矢以當其鋒者雖卻縠之明經書祭遵之雅歌投壺羊叔子之輕裘緩帶時舉蓋不多遜也久乃出詩詞四帙示余余熟之復之於是盡得時舉之為人今將御秋風東行過六一之鄉試持盃酒酬先生味其言而想見其風其必有得矣他日一笑相逢幸為余道之嘉定甲申夏季贈相者王仲父序永嘉王仲父以風鑑㳺士夫間攜版曹曾君書來謁余亟見之其容泊如其論鏘如誠有如曾君所云者余方欲觀賢者於世煩仲父助余訪之或端居渾穆而胸中自有丘壑或退然如不勝衣而智慮足以籠絡宇宙或其外介然而襟度粹夷吞吐雲夢而畧不芥蔕或野服草履一瓢一簞而軒冕之貴不足以動其心若是者皆余之所願師且願交焉者也仲父足跡半天下閱人多矣今又將踰梅關觀南海所至亦逺所見當益髙茍於是有得焉還以告余余將許仲父具一隻眼嘉定甲申季夏陳大庾公餘集序古今官職號為繁劇者甚多而邑為甚處繁如處約處劇如處閒可以觀政矣不齊之琴子㳺之絃歌其胸中浩然與造物者並游於八極之表曾是繁且劇者得以累其天哉三山陳君國華來宰大庾踰年而余適到值君方攝學事辱為交承即之而溫叩之而不窮而尤樂寓意於詩語一出口則士流輒争取傳誦以為楷時蓋久作益富則又為之鋟梓以傳余得而觀之其詞清而不癯贍而不汙而意態更自閒適蓋喟然而嘆曰琴於單父絃歌於武城詩於大庾殆異世而同轍者歟方其調素絃聳吟肩聲出金石筆落風雨豁然而萬象呈悠然而百慮消豈知有所謂箠之楚之之勞簿書期㑹之廹哉至於詩出而人誦之既誦而梓之士民相安之情亦可槩見夫惟為政而不得罪於士民斯可矣然余之所欲言者外與内一理也身與政一本也君之體方有所底滯而未得其平繁劇既不能為吾政累則底滯當亦不能為吾身累矣噫飬身之法詩法是也君盍反求之已酉奉御筆宣諭之平江府任恭䟦御筆云聞徐某疾已痊安念其賢而有才决不可聴其歸吳門咫尺宣諭此意勉其之任某至平江刻御筆於郡治恭䟦云恭惟皇帝陛下仁恕根於天性忠厚得以家傳涵覆寓宇壹以中庸之道為本羣臣則體之真如腹心手足之視也庶民則子之真如痒疴疾痛之切也視三五聖人之用心蓋同一揆臣孤蹤寒逺久分投閒淳祐更化之明年上誤眷知復塵班列踰嵗被疾滿三月告終不瘉勢􅉵甚乞去弗獲復䝉恩予麾節力辭又弗獲進退彷徨惕焉懼得罪迺閏四月十有七日相臣以傳旨宣諭賜臣御札勉令之官臣端簡捧誦龍翔鳳翥星輝日麗恍然溫綸之挾纊灑然病骨之欲仙臣亟百拜稽首欽承天子威命甫旬日即扶曳就道紬繹聖訓夢寐不敢忘夫臣有疾陛下念之臣乞歸陛下留之臣未行陛下勉之非體之深乎然仰窺如天之仁豈直為臣一身計哉扶風于今為股肱郡自朝廷視之則臣身為近自淮浙視之則吳門為近由是而推以及於四方萬里之廣愈逺愈近愈疎愈切所以體羣臣乃所以子庶民也天章昭回實與中庸之旨相表裏凡為臣子者疇不感勵激發殫死力以報萬分哉思昔汲黯守淮陽自以病力不能任郡事武帝勉之曰吾徒得君重卧而治之爾臣之才不足望黯而陛下之恩過於武帝使臣不以淮陽治吳門則為負其民不以汲黯事陛下則為負其君用敢勒諸堅珉以紀聖恩以明臣志䟦無垢借米帖軍倉遂絶糧九成至此十三年未嘗見也白米借十石糯米二石以濟其目下艱窘公如納秋苗却可就取也九成干凂日升學諭宅上萬福右無垢先生寓横浦時借米於曾君日升帖也先生遺墨在郡者多矣聞人達士皆嘗表而出之獨此帖湮晦不傳某從日升之曾孫國良借觀之三復以還宛然而趨下風承謦欬也嗟夫士固不免於窮窮然後見君子魯公之乞米先生之借米其困阨無聊甚矣而傑然之氣浩浩乎其胸中不衰也抑於是竊有感焉古人固有三旬而九食甑塵而釡魚者矣而二公不能以無求何哉蓋道無常在在時而已當其不可則不食不受不害其為髙當其可則或乞焉或借焉不失其為潔愚因先生之節又以知曾君之賢所謂十三年蓋紹興乙亥嵗也後七年中秋南昌徐某敬題䟦杜子野小山詩言天下之美至於同而止五穀天下之正味其美不待贊也至於水草之葅陸海之産亦得以擅美焉何也以夫人所同嗜也十年前聞子野有能詩聲今於梅花嶺下得其藁亟揮俗吏去披巻讀之雖未暇饜觀而佳句已領畧矣及觀諸老題䟦則凡所當識處徃徃與愚意合信知口之於味有同嗜焉茍同矣其為美無疑也短長肥瘦各有態玉環飛燕誰敢憎要當作如是觀若夫五穀以主之多品以佐之則又在吾心自為持衡少陵五穀也晚唐多品也學詩調味者也評詩知味者也孟子有言至於味天下期於易牙試與子野商之嘉定甲申閏八月哉生明李監稅子以其祖肖堂所書盤谷序求䟦為書其後魏鄭公以忠亮聞於唐世寳其笏至孫謩挺挺有祖風於是家益大忠益著笏益重人主至以比甘棠噫是可觀已為肖堂之孫者尚勉之文谿曾氏五君圖贊并序西昌曾肅溫夫嘉祐進士山谷宰邑以清髙處士目之有子四人長安辭長吉三舉與大觀三年特奏名闢室以居繪古逸士十人於壁而徜徉其間號十一居士次安上移忠熈寧中兩中第仕止彭澤令號屠龍君嘗著禾譜東坡所為作秧馬歌者次嶧舜和元符二年進士仕止清川丞號青城山人次安强南夫第元和三年一科仕止湖南常平使者號秀溪居士是為文溪曾氏五君子其曾孫待舉繪為圖求贊贊曰超然一翁四子儀之孝友之風見於鬚眉窮不失義達不離道問胡為然從吾所好落落難合皓皓易汙歲晩松檜獨不我疎父子一家榘矱千古勗我雲仍祖乃厥祖梯雲義約横浦以周程重以無垢愈重欲學周程唯學無垢可矣今士子進身獨科舉一途科舉未可少也無垢以經學試秋闈薦名第一試南宫又第一對集英又第一而先生之所養所言所守何如也志先生之所志學先生之所學則伊洛可詣義約可舉而科舉可無愧也䟦黄瀛父適意集余㓜讀少陵詩知其辭而未知其義少長知其義而未知其味迨今則畧知其味矣大抵義到則辭到辭義俱到味到而體製實矣故有豪放焉有竒崛焉有平易焉有藻麗焉而四體之中平易尤難工就唐人論之則太白得其豪牧之得其竒樂天得其易晚唐得其麗兼之者少陵所謂集大成者也余固樂於易而瀛父實以易得之是與余同味者故書送造墨唐生序予來横江兩載有以硯岡文集惠教者讀之累日不厭於是始知有硯岡越明年唐君攜墨卿來訪問其世則固硯岡之裔也予已心知其墨之善矣呼陶泓毛頴楮先生面試之皆曰可於是又知有唐君大抵人之於書於畫於琴棋筆墨均名一藝使庸俗輩為之非不具形模也非不存節奏也非不備體勢也然形完而神敝聲宣而韻淺外澤而中枯作者一出意為之則相去往往懸絶是豈可以智巧索哉採丹若神運斤成風必有進乎技者矣唐君誠有以似硯岡之傳則墨其餘事也䟦趙簿覺菴彚藁先儒以手足痿痹喻不仁而以覺言仁方其不仁也吾之心腹手足百骸九竅藩籬横生封畛角立無自而能一及其覺也則萬事一事耳萬物一物耳萬理一理耳無徃而不一是故覺為難誠覺矣其於言於行於已於人於家於國有二理乎無也覺菴趙君與僕為同年友仕南安為同寮其文老健雄放發於學力之所到不與後生抽黄嫓白者馳騖為髙其遇事敏而銳其子弟秀樸固知其非偶然者及觀所著彚藁而養志一說實先焉詞旨之深有以推明内則之所已言而發揮吾孟子之所未言者而後知覺菴之悟門在此也夫覺則為仁而仁之實在於尊親推此而立言垂教則千條萬緒其有外於此覺者乎伊尹曰予將以覺斯民也覺庵尚勉之廬陵譚校正以自牧名其齋請予銘之山兮巖巖而蘊於地至髙能下乃謙之義是心之微出入無時一失其養矜夸敗之大言欺世盛氣凌物求名而亡為徳之賊衆山雖髙猶有嵩衡嵩衡極矣天在其先君子人與卑以自牧若無若虛雖足弗足追羊羊亡飯牛牛肥凡牧之道推此可知清正存稿巻五
