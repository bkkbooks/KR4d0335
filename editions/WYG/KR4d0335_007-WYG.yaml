body:
  text: 清正存稿附録年譜公諱鹿卿字徳夫隆興府豐城縣人徐出於伯翳自漢南州孺子著名豫章至本朝大中祥符兀年有仲孺者擢進士第嘗歴顯宦系出陵祖世居覺溪至五世祖諱簡徙居正信鄉之歴山曾大父諱文貴贅居同鄉之後泉始為後泉里人祖諱洪源父諱琮累贈朝散大夫前妣王氏累贈令人妣甘氏封太孺人累贈令人淳熈十六年己酉十一月壬申日丑時公生於後泉之故居是夕有青蛙甚巨出於甘夫人寢室已而生公紫衣覆體人咸異之嘉定六年癸酉秋八月丁大夫公憂九年丙子秋八月秋賦已在選中有司以重用字降魁亞選十二年己夘春正月立青雲課社十三年庚辰分類編漢唐紀傳本末十五年壬午秋九月領鄉舉十六年癸未春二月試禮部中第三等夏五月對策集英殿勅賜進士及第授迪功郎南安軍軍學教授冬十二月之任十七年甲申立養士綱條議政白太守議便民二事寳慶元年乙酉代守奏便民三事白太守論茶引事白太守論三寨事白太守論南安縣事白太守論特筆徒刑事白太守論楮弊界分以登寳位赦恩循修職郎秋八月校文廬陵二年丙戌春二月白太守論立限撰勸農文白太守論釋奠改用仲丁秋七月修學覈租九月子子志生白太守為胡公夢昱評事三年丁亥春三月滿替離横浦在任舉主是嵗以舉主考第及格繳納脩職郎改作奏舉闗陞縣令循從政郎用南安軍教授任滿賞循文林郎九月差充福建路安撫司幹辦公事紹定元年戊子春暉堂成三山鄭湜書扁二年己丑夏四月味書閣成冬十一月之福建任三年庚寅春正月㳂檄道劍賑給流民四年辛夘夏四月以慶夀赦恩循承直郎秋八月校文漕闈秋九月都城災應詔上封事冬十二月奉檄慮囚于長樂福清永福三縣五年壬辰秋九月大閱軍士有偶違節制者因公言得貸命閩人作三歌冬十二月滿考准部符舉主考第及格不候替人離任赴部改官在任舉主六年癸巳春正月班改授奉議郎知南劍州尤溪縣三月歸自任所曾大參制置江淮辟公為屬以母老辭冬十月泉守西山真公辟知泉州南安縣冬十一月到任始至首罷科斂之無名者端平元年甲午春正月革預借明版章二月勸農救荒夏六月丁甘太夫人憂秋八月有旨令赴都堂審察冬十一月塟太夫人二年乙未春二月子子中生三年丙申春三月有旨特與起復令日下赴樞密院稟議并降促行指揮公力具狀辭免乞與敷奏收回成命夏四月密劄促行具狀再辭附遞白政府論稅畆秋九月有旨令服闋日赴樞密院稟議冬十月至任所堂稟論待敵救楮二劄論儲才寇賞二劄論遣使事宜論楮價折閱十一月除主管官告院丁夘申省為江陵制司乞再科撥官告及秤提官告四年丁酉春三月除幹辦行在諸司審計司乙巳申部謂不當幇放史佑神米麥夏四月除國子監主簿秋九月除樞密院編脩官冬十月劄權右司議楮十一月主管華州雲臺觀三年戊戌公歸號泉谷樵友菴山書院成秋九月差知建昌軍冬十二月佩玉堂成三年己亥春正月申審朝辭三月以磨勘轉承議郎夏四月到任諭賊訓練戍兵秋八月乞祠不允九月有旨令赴行在奏事辭免不允冬十月革秋苗受納之弊十一月癸巳南豐賊首倡亂遣兵討捕至十二月丙申平之十二月朔除度支郎官兼右司辭免不允請假過家拜掃四年庚子春正月辛未解郡印二月朔入國門得旨先次供職令闔門引見上殿丁丑上殿奏事夏四月除侍左郎官兼右司白廟堂論楮弊六月除右司郎官再條具易楮事宜辛巳改兼玉牒所檢討官八月差主管華州雲臺觀以盱江平寇特轉朝奉郎九月除江東運判辭免不允白廟堂論易楮准朝旨任責秤提三郡㑹子備榜曉諭上廟堂論中半及新舊分數入納書附奏乞科撥糴米賑濟饑民淳佑元年辛丑春正月復廟堂言楮弊二書戢姦民賑貧乏收遺棄減賑惠庫息錢二月被旨徃當塗廵歴决淹獄劾知太平州岳珂在任不法三月庚寅除兼權知太平州時暫交割制置茶鹽司職事五月差充江東提領官辭免不允秋七月除浙東提刑辭免不允冬十月丙申除直秘閣依舊浙東提刑兼權浙東提舉辭免不允丙午以磨勘轉朝散郎在任舉官冬十月甲戌到任十一月海寇被旨討捕十二月戊午至處州乙亥抵溫州施行鹽政二年壬寅劾承奉郎林志行紹興府司理趙希肱台州天台縣主簿郎應辰不法五月差主管紹興府千州觀秋七月差知泉州九月改知贑州三年癸夘春三月除浙西提刑秋七月除江淮都大提刑四年甲辰冬十一月御筆召赴行在辭免是月除寳章閣知寧國府兼江東提舉兩辭免不允五年乙巳春二月除右司辭免不允夏四月朔入國門磨勘轉朝奉大夫孟享除太府少卿兼權右司郎中辭免不允上殿奏事六月除兼中書門下省檢正諸房公事辭免不允應詔薦士秋七月除兼崇政殿説書辭免不允八月戊寅進講尚書讀九朝通略通鑑綱目九月進明堂頌己未進講冬十月壬戌進講奏己見乙丑進講同日進故事乙酉進講十一月乙未進講癸夘進講戊辰進講乙夘除太府卿辭免不允戊午旨賜御書味書閣遺安堂六大字謝表十二月戊辰進講乙巳進故事癸未進講六年丙午春正月直前奏事癸丑論政府制國用并乞釐正檢正官名甲寅進講二月辛酉朔進故事甲子進講同日經筵奏乞免兼校正戊辰進講三月壬辰進故事戊寅進講丙戌除右文殿脩撰知平江府兼淮浙發運副使閏四月連具辭免不允己酉丞相游奉御筆宣諭之任五月到任六月約束科舉九月大閱冬十月勸駕十一月乞歸老不允十二月再乞歸老不允七年丁未春正月乞歸田里不允二月勸農於虎丘三月再乞歸里夏四月乙巳召赴行在辭免不允五月戊午除權兵部侍郎三辭免不允秋八月乙未望離吳門乞給告歸里九月朔有旨令伺候内引壬子入國門是日内引丙辰除國子監祭酒再辭免不允供兵部侍郎職謝表冬十月除權禮部侍郎再辭免不允供禮部侍郎職謝表壬寅進故事丁酉進故事八年戊申春正月乞祠不允再乞祠不允丁夘除兼同脩國史兼實録院同脩撰辭免不允二月脩學宫薦賢三月丙辰進故事六月戊戌除兼侍講辭免不允己亥進故事秋七月除兼權給事中再辭不允辛酉進講經筵奏己見冬十月己夘進講己亥進講十一月丙辰乞免兼職再辭不允甲子乞免兼祭酒不允戊辰進講十二月乙亥進講九年己酉春正月除禮部侍郎辭免不允二月癸夘再申前請辭賜帶庚子除寳章閣待制知寧國府辭免不允夏四月再辭新命力乞掛冠六月再辭免仍乞守本官致仕冬十月旨别與州郡差遣辭免并乞休致十月庚戌秋九月疾亟乞謝㫖特轉一官進文華閣待制致仕丁亥公薨遺表聞詔贈四官諡清正十二年壬子塟公本縣奉化鄉之桂林將軍山後林李公義山為狀後村劉公克莊撰神道碑端明殿學士陳公昉書并題葢詔誥九年己酉春正月除禮部侍郎誥貳卿之亞文昌衣冠華選春官之小宗伯禮樂攸司肆疇試可之賢爰錫申命之寵具官徐某亷隅有守悃愊無華理義悦心自得味書之趣謀猷告后不求當世之名入綴從班久煩疊組瑣闥聳聞於風采橋門久賴於師資史院推長經帷賴益惟虞書重秩宗之任而漢制著滿嵗之文宜遂為真式昭至眷日月獻納期愈罄於忠規夙夜寅清尚翊成於邦典祇若予訓母有遐心直舍人院陸徳輿行辭免禮部侍郎不允詔勅某省所奏辭免除禮部侍郎兼職依舊日下供職恩命事具悉舜命夷䕫典禮樂終身不易而書有陟明之文卿以儒學端介攝貳宗伯才兼數器選要秩清逾歲為真僉言允穆乃欲求去何也前受是則辭非奚庸稽首以遜昔者病而今愈正資造膝之規汝徃欽哉毋咈朕意所辭宜不允故兹詔示想宜知悉再辭免不允詔勅某省三省進呈卿狀乞給告三月歸里燎黄并治醫藥或與祠禄事具悉卿樸茂篤實為時老成久貳儀曹甫兹正位入陪經幄多所沃心况銀臺綱紀之所闗璧水範模之所係職任至重正有賴焉乃以疾諗爰及其私昔漢制吏病滿三月乃賜告然亦不得歸也卿雖㣲疢聞發動有時方春時和何恙不已其存精神止念慮輔助醫藥以自持請告祈閒非所願聞也所請宜不允故兹詔示想宜知悉秋九月疾亟乞謝事㫖特轉一官進文華閣待制致仕誥承明厭直久從均佚之遊神武掛冠遽有辭榮之請重違其志姑遂爾高具官某悃愊無華果毅以逹為諸侯客且烜赫於聲猷乘使者車屢振揚於風采入儀從槖罙罄忠規領大司成則能令六管無譁兼小門下則何止二勅執議俄以疾而引去雖欲畱而不能側席思賢方擬促蒲輪之召垂車謝事乃竟惟菊徑之安徒嘅嘆其英風庸務全其晩節爰進漢官祿階之寵載陞媯閣次對之華既明且哲以保身何慙大雅視履考祥其遄吉益燕脩齡中書舍人陸徳輿行封豐城縣開國男食邑三百户誥清廟之祀文王周歌顯相甘泉之見上帝漢紀侍祠眷言重屋之威儀允賴重臣之秉徳既成熈事宜舉慶條具官徐某篤實秉資端方植操典朕三禮正資小宗伯之賢誨我諸生允藉大司成之重夕瑣風生於駁正露門日賛於緝熈属時明禋率職毖助兹溥均於祭澤庸昭答於賢勞啓爾爵封錫之采邑雖曰彛章之舊是惟眷命之新其懋逺猷以綏燕譽中書舍人陸徳輿行史志宋史本傳徐鹿卿字徳夫隆興豐城人博通經史以文學名於鄉後進爭師宗之嘉定十六年廷試進士有司第其對居二詳定官以其直抑之猶置第十調南安軍學教授張九成嘗以直道謫居鹿卿摭其言行刻諸學以訓先是周敦頥程顥與其弟頥皆講學是邦鹿卿申其教由是理義之學復明立飬士綱條學田多在溪峒異時征之無藝農病之鹿卿撫恤無逋租者其後盜作環城皆燬惟學宫免曰是無撓我者辟福建安撫司幹辦公事㑹汀邵冦作鹿卿贊畫備禦動中機㑹避冦者入城多方賑濟全活甚衆郡多火災救䕶有方㑹都城火鹿卿應詔上封事言積隂之極其徵為火指言惑嬖寵溺燕私用小人三事尤切真徳秀稱其氣平論正有憂愛之誠心改知尤溪縣徳秀守泉辟宰南安鹿卿以不便飬辭徳秀曰道同志合可以拯民何憚不來鹿卿入白其母欣然許之既至首罷科斂之無名者明版籍革預借决壅滯逹寃抑邑以大治徳秀尋帥閩疏其政以勸列邑嵗饑處之有法富者樂分民無死徙最聞令赴都堂審察以母喪去詔服闋赴樞密院議首言邊事楮弊主管官告院幹辦諸司審計司故相子以集英殿脩撰食祠禄又幇司農少卿米麥鹿卿曰奈何以一人壊成法持不可遷國子監主簿入對陳六事曰洗凡陋以起事功昭勸懲以收主柄清班著以儲實才重藩輔以蔽都邑用閩越舟師以防海合東南全力以守江上皆嘉納改樞密院編脩官權右司贊畫二府通而守法㑹右史方大琮編脩劉克莊正字王邁以言事黜鹿卿贈以詩言者并劾之太學諸生作四賢詩知建昌軍未上而崇教龍㑹兩保與建黎原鐡城之民脩怨交兵鹿卿持書諭之斂手聽命既至則寛賦斂禁掊克汰贓濫抑强禦恤寡弱黥黠吏訓戎兵創百丈砦擇兵官城属縣治行大孚田里歌頌督府横取秋苗斛面建昌為米五千斛鹿卿爭之曰守可去米不可得民恐失鹿卿請輸之以共命鹿卿曰民為守計則善矣守獨不為民計乎卒爭以免召赴行在將行盜發南豐捕斬渠首二十人餘不問擢度支郎官兼右司入對極陳時弊改侍右郎官兼勅令刪脩官兼右司鹿卿又言當時並相之弊宰相以甘言誘鹿卿退語人曰是牢籠也吾不能為宰相私人言者以他事詆鹿卿主管雲臺觀起為江東轉運判官嵗大饑人相食留守别之傑諱不詰鹿卿命掩捕食人者尸諸市又奏援真徳秀為漕時撥錢以助賑給不報遂出本司積米三千餘石減半價以糶及減抵當庫息出緡錢萬有七千以予貧民勸居民收字遺孩日給錢米所活數百人宴集不用樂㑹岳珂守當塗制置茶鹽自詭興利横斂百出商旅不行國計反絀於初命鹿卿覈之吏爭竄匿鹿卿寛其期限躬自鈎考盡得其實珂辟置貪刻吏開告訐以罔民没其財民季士賢有稻二千石囚之半嵗鹿卿悉縱舍而勸以其餘分皆感泣奉命珂罷以鹿卿兼領太平仍暫提舉茶鹽事弛苛征蠲米石蕪湖兩務蘆稅江東諸邦飛蝗蔽天入當塗境鹿卿露香黙禱忽飄風大起蝗悉度淮之傑密請移鹿卿浙東提㸃刑獄加直秘閣兼提舉常平鹿卿言罷浮鹽經界鹻地先撒相家所築就捕者自言我相府人鹿卿曰行法必自貴近卒論如法丞相史彌逺之弟通判溫州利韓世忠家寳玩籍之鹿卿奏削其官初鹿卿檄衢州推官馮惟説决務惟説素亷平至則辨曲直出淹禁大家不快其為㑹鄉人居言路乃属劾惟説笑曰是猶可以仕乎自題詩印紙而去衢州鄭逢辰以繆舉鹿卿以委使不當相繼自劾且共和其詩御史兼二人劾罷之及知泉州改贑州皆辭遷浙西提㸃刑獄江東都大坑冶皆以病固辭遂主管玉局觀及召還又辭改直寳章閣知寧國府提舉江東常平又辭淳祐三年以右司召猶辭丞相杜範遺書曰直道不容使人擊節君不出豈以馮惟説故耶惟説行將有命矣鹿卿乃出擢太府少卿兼右司入對請定國本正綱紀立規模時事多艱人心易摇無獨力任重之臣無守節仗義之士願早决大計上嘉納之兼中書門下省檢正諸房公事兼崇政殿説書逾年兼權吏部侍郎時議使執政分治兵財鹿卿執議不可以疾匄祠遷右文殿脩撰知平江府兼發運副使力匄祠上諭丞相挽留之召權兵部侍郎固辭上令丞相以書招之鹿卿至又極言君子小人切於當世之務兼國子祭酒權禮部侍郎兼同脩國史兼實録同脩撰兼侍講兼權給事中鹿卿言瑣闥之職無所不當問比年命下而給舍不得復請復舊制從之上眷遇深篤而忌者寖多有撰偽疏托鹿卿以傳播歴抵宰相至百執事鹿卿初不知也遂力辯上前因乞去上曰去則中姦人之計矣令臨安府根捕事連勢要獄不及竟遷禮部侍郎累疏告老授寳章閣待制知寧國府而引年之疏五上不允提舉鴻禧觀遂致仕進文華閣待制卒遺表聞贈四官鹿卿居家孝友喜怒不形恩怨俱冺宗族鄉黨各得歡心居官亷約清峻毫髪不妄取一廬僅庇風雨所著有泉谷文集奏議講義鹽楮議政藁歴官對越集手編漢唐文類文苑英華諡清正江西通志列傳徐鹿卿字徳夫豐城人博通經史以文學名嘉定十六年舉進士調南安軍教授改福建安撫司幹辦公事㑹都城災應詔上封事指言惑嬖寵溺燕私用小人三事尤切真徳秀守泉辟宰南安邑以治最聞遷國子監主簿入對陳六事上皆嘉納累擢太府少卿兼右司復奏請定國本正紀綱立規模上欣納之眷遇益篤改禮部侍郎授寳章閣待制知寧國府提舉鴻禧觀遂致仕進文華閣待制卒鹿卿居家孝友守官亷峻所著有泉谷集行於世江西㕘政林庭㭿副使周廣纂脩江西通志名宦傳徐鹿卿為南安軍學教授先是周敦頥與其門弟程顥程頥皆講學是邦鹿卿申其教由是理義之學復明立飬士綱條學田多溪峒鹿卿撫恤無逋租者其後盜作惟不燬學宫曰是無撓我也纂修前人豐城縣志徐鹿卿字徳夫後泉里人博通經史以文學名後進爭宗師之嘉定登進士調南安軍學教授張九成嘗以直道謫居鹿卿摭其言行刻諸學以訓先是濓溪二程皆講學是邦鹿卿申其教由是理義之學復明改福建安撫使㑹都城災應詔上封事言積隂之極其證為火指言惑寵嬖溺燕私用小人三事尤切真徳秀尋帥閩疏其政以勸列邑遷國子監主簿入對陳六事上皆嘉納改右侍郎兼右司又極言當時並相之弊宰相以甘言誘之鹿卿退語人曰是牢籠也吾不能為宰相私人言者以他事詆鹿卿主管雲臺觀起為江東轉運判嵗大饑人相食鹿卿命掩捕食人者又出倉粟減市值之半以糶秋乃糴償諭民收養遺棄官與賑給遷浙西提㸃刑獄江淮都大坑冶皆以病固辭遂主管玉隆觀改崇政殿説書轉對論儲相謂侍從者執政之儲執政者宰相之儲當於人才之有學力才力心力者學欲其正而通才欲其𢎞而毅心欲其公而大經筵講棠棣詩反覆天理人心之變為濟邸發也遷禮部侍郎累疏致仕進文華閣待制仕宦二十年殁之日家無餘貲謚清正爵國男浙江通志官師志徐鹿卿字徳夫豐城人嘉定進士調南安軍敎授嘗應詔上封事真徳秀稱其氣平論正有憂愛誠心時宰相以甘言誘鹿卿退語人曰是牢籠也吾不能為宰相私人竟以事出主雲臺觀越月起為江東轉運判官嵗大饑人相食鹿卿設法賑救全活甚衆遂移浙東提㸃刑獄丞相史彌逺之弟通判溫州利韓世忠家寳玩籍之鹿卿奏削其官淳熈三年以右司召丞相杜範遺書促之廼出進文華閣待制卒所著有泉谷文集奏議講義鹽楮議政稿歴官對越集手編漢唐文類文苑英華謚清正浙江提學副使薛應旂纂脩八閩通志方面名宦傳徐鹿卿字徳夫隆興豐城人嘉定間教授南安軍辟幹辦福建安撫司公事㑹汀邵冦作鹿卿贊畫備禦動中機㑹避寇者入城多方賑濟全活多人郡多火災救䕶有方後改知尤溪縣真徳秀守泉復辟宰南安鹿卿居官亷約清峻毫髪不妄取莆人督學僉事前翰林黄仲昭纂脩八閩通志郡邑名宦傳徐鹿卿與真徳秀同時徳秀守泉以其道同志合可以拯民辟宰南安既至首罷科斂之無名者明版籍革預借决壅滯達寃抑邑以大治嵗饑處之有法富者樂分民無死徙徳秀尋帥閩疏其政以勸列邑纂修前人福州府志名宦傳徐鹿卿字徳夫豐城人嘉定間教授南安辟幹辦福建安撫司公事㑹汀邵寇作贊畫備禦動中機㑹避寇者入城多方賑濟全活甚衆郡多火災救䕶有方後改知尤溪真徳秀守泉復辟宰南安居官以亷約清峻聞正徳十四年郡人南京兵部尚書林翰纂脩福州府志名宦傳徐鹿卿字徳夫豐城人嘉定間教授南安辟福建安撫司幹辦官㑹有汀邵寇鹿卿贊帥禦之民避入城者多方賑濟全活甚衆萬歴六年郡人禮部尚書林燫纂脩福州府志名宦傳徐鹿卿字徳夫豐城人嘉定間辟幹辦福建安撫司公事㑹汀邵寇作鹿卿贊畫備禦動中機㑹避寇入城者多方賑濟全活甚衆郡多火災救䕶有方鹿卿居官亷約不妄取萬歴四十年郡人南京工部尚書林烴吏科都給事中林材纂脩閩大記名宦傳徐鹿卿字徳夫豐城人嘉定間福建安撫司幹辦公事鹿卿守官清苦講明正學閩士宗之㑹汀邵寇發贊帥備禦動中機㑹民避寇入城多方賑恤全活者無算改知尤溪縣真徳秀守泉辟知南安始至首罷無名科斂革預借明版籍勸農救荒未及期年邑遂大治徳秀尋帥閩疏其政以勸列邑鹿卿官至禮部侍郎諡清正侯官野史王應山纂輯男王毓徳編次泉州府志名宦傳徐鹿卿字徳夫豐城人嘉定十六年進士嘗辟福建安撫司幹辦公事都城火鹿卿應詔上封事言積隂之極其徵為火指言惑嬖寵溺燕私用小人三事尤切改知尤溪縣真徳秀守泉辟宰南安縣既至首罷無名之賦明版章革預借决壅滯達寃抑邑以大治嵗飢諭民以相賙之道富者樂分貧無死徙徳秀尋帥閩疏其政以勸列邑最聞令赴都堂審察以母喪去隆慶二年郡人刑部尚書黄光昇户部侍郎黄養䝉纂脩泉州府志名宦傳徐鹿卿紹定六年知南安縣既至首罷無名之賦明版籍革預借决壅滯達寃抑邑以大治嵗饑諭民以相周之義富者樂分貧無死徙真徳秀疏薦於朝以母喪去萬歴四十年郡人禮部尚書黄鳳翔纂脩紹興府志名宦傳徐鹿卿字徳夫豐城人嘉定中進士調南安軍教授嘗應詔上封事真徳秀稱其氣平論正歴江東轉運判官嵗大饑人相食鹿卿設法賑救全活甚衆隨移浙東提刑兼提舉常平鹿卿請罷浮鹽經界鹻地先撤相家所築就捕者自言我相府人鹿卿曰行法必自貴近始卒論如法丞相史彌逺之弟通判溫州利韓世忠家寳玩籍之鹿卿奏削其官終文華閣待制諡清正萬歴十四年郡人左春坊諭徳張元祚太常少卿孫鑛纂脩䟦徐徳夫所藏朱文公五帖宋眞徳秀浦城人資政殿學士予聞徐君徳夫之賢未之識也獨見其漕臺所發策意其葢嘗從事於諸老先生之學者今乃以文公數帖來示其於遺墨且寳之如此則公之格言大訓必嘗服膺奚疑諸帖所以告學者雖不同要弗越致知力行四字徳夫深玩實體而守之終身異時所到將有不可涯涘者徳夫其懋之味書閣記為徳夫右司作宋劉克莊莆田縣人禮部尚書閣在豐城山間名子賤潘公也筆廣㣲袁公也徳夫讀書其上有年矣去而仕於朝因以其所讀者為天子言之忠憤激發幾寤上意竟坐是由省闥放還故山或竊笑曰世葢有剽竊渉獵書之豪芒而光顯遇合者徳夫無所不讀顧齟齬留落如此意者書誤徳夫耶徳夫寧能常味此無味之味耶徳夫亦笑曰有是哉夫書無窮盡味有淺深嘗試以古今人觀之行之篤守之固味之深者也先信而後畔始合而卒離味之淺者也叔孫通魯兩生皆學禮一以取封一沒世無聞舒𢎞皆學春秋一起徒步拜相一老擯郡國豈非深者守道而難合淺者諧世而易售歟使其果深於書捽茹山雌也脫粟太牢也茍為不然如㗖土炭如嚼蠟久將唾棄之矣然則徳夫之所味固世之所不能味世之所味固徳夫之所不屑味歟或又笑曰閣僅三間奚其記余曰不然石渠夫禄髙則髙矣而不能逃莽大夫之譏臨春結綺美則美矣而不能渝狎客之謗徳夫閣雖小聖賢之事具焉古今之變合焉天下後世之責在焉徳夫味之不已出則為遺直為名臣處則為高士為全人是閣與天壤俱敝矣勿記可乎清正存稿附録
