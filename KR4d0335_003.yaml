body:
  text: 清正存稿卷三宋徐鹿卿撰表三月以磨勘轉承議郎夏四月到任謝表伏以投閒雲壑空懷畎畝之忠錫命天庭忽冒麾符之寄縮五六年而成近次越三百里而為便家被上旨以促行進邦民而布令臣某中謝伏念臣某資材愚下學術空疏忝竊甲科初乏洋洋之對驅馳外服了無赫赫之名屬端平更化之初察小吏勤身之故過推邑最獲玷朝紳一從升列院之班再轉備西樞之屬衆論已疑其超躐宰司更預于謨謀感造化之曲成恨涓埃之莫報嘗因登對冒貢狂愚聖度有容頗是齊賢之四說他人不省過尤蘇軾之多言荷泰道之包荒領祠官而逺引丹心日皎榮念灰寒敢圖寸朽之不遺特許方城之自效載瞻封域實介江閩疇昔瘡痍未加針砭祇今疥癬復費爬搔正憂疆場之多虞可使蕭墻之易動况利盡而忍加抉摘兼楮輕而無策稱提共知局面之難扶安得盤根之立剖自慚庸謭誤入選掄兹蓋伏遇皇帝陛下坤轉乾旋海涵春育兼收並蓄無材不入於甄陶一視同仁雖逺亦如于畿甸厚根本之培植憫田里之歎愁謂臣近在鄉關必稍諳于土俗知臣奮由寒畯或粗達于人情乃棄短而取長俾承流而宣化臣敢不俯殫駑力仰答鴻私憑仗國靈彌渤海帶刀之習奉承詔旨慰山東扶杖之思免求一分之寬以蘇千里之急十一月視印于南康境上閏十二月到司謝表近日長安甫祝釐而西去觀風江滸誤將指以東來循墻莫遂于懇祈入境具宣于寬大俯慚忝竊仰戴生成伏念臣空抱古心豈堪世用少遊場屋志一第以為榮壯踐仕途蔑寸功之自見當路過為之汲引明時曲示於收羅由凋邑以登朝起祠庭而豫郡固未嘗違道干譽亦不敢因公病私偶無得罪於軍民安有隨車之老稚殆饑渴易為於飲食非涓埃可益於海山入玷郎闈躐升省闥上恩深厚但知空臆以盡言世論嶮巇必欲索瘢而洗垢絲毫無此天日臨之置散投閒正尋盟于鷗鷺取長捨短忽促駕於騏駰固辭非所以效忠冒進又幾於鮮恥莫違淵聽祇拜溫綸饑歉頻年曷給馬牛之運流離滿野孰安鴻雁之居曽是么麼可供任使兹蓋伏遇皇帝陛下與人而不求備嘉善而矜不能念臣意在愛君忍終加於棄絶察臣才非經世尚粗竭於拙勤畀以皇華責其後效臣敢不盡忱體國悉力為民一江數千里風寒諒書生之何補九州四十三屬邑庶濬澤之周流冬十月甲戌到任謝表非才護漕職有愧于兼三改命詳刑恩許令於共二仍通班于中祕示增重于外臺祇拜寵光首宣寬大臣某伏念臣孤踪寒逺陋質迂疏文不足以為國之華勇不足以敵王所愾其言皆平平之策非過激而難行所至無赫赫之名期相安於弗擾比司飛挽適值饑荒芻莫能求祇負距心之罪廩微可發空懷汲黯之忠况復攝官尤虞非據軍旅之事未之學也自顧何裨錐刀之末將盡爭之信非得已猶念公家之久匱恪遵渙汗而不移雖粗寬于一分常懼盈于百謫安能鞭算徒有管窺必先足正額之鹽乃可通浮鹽之運果能禁上流之稅亦何害免稅之征欲求斡旋通變之方當識本末重輕之理方籲天而丐免忽易地以周諏由漕而刑均號觀風之選自江而浙益增近日之榮兹蓋伏遇皇帝陛下無求備于一夫每哀矜于庶戮謂毫芒析利毋庸責效于書生而囹圄未空姑俾盡心于臬事失之于前者將收之於後尺有所短者或寸有所長察欂櫨杗桷之殊施忍毛髮粟絲之輕棄臣敢不仰承欽恤俯念侀成山嶽震搖可但令行于屬部乾坤生育終期德洽于民心戊午賜御書味書閣遺安堂六大字謝表書帷夕說閲日未幾易畫芒寒自天有隕神筆一施于潤澤草茅倍長于聲光目盡駭于榮觀手不知其自舞臣某惶懼惶懼頓首頓首臣恭以我宋淵微之家學每因暇日游戲于法書有如私室之扁題尤示聖恩之優異或野處賁詞臣之第或茂功旌勛舊之門藏在名山具存彛典歷數西江之盛事於昭列聖之宸奎太祖表洪氏之義居光堯書萬里之齊額然名德乃膺是眷豈么微可擬其倫伏念臣少也多竒長而無述短檠二尺妄窺往聖之微言破屋數間近守先臣之故址茍焉葺理于以藏修讀書之眼已昏負郭之田何有謂學問求放心而已而貧賤庸玉女于成得一善則服膺食知其味恐多財而㿽疾獨遺之安英華自咀于窮年夢寐不忘於清夜淡而弗厭樂以忘憂此微臣飭已之私亦古者刑家之意輒因閒燕乞假寵靈方虞鈇鉞之誅忽委琳琅之賜色齊南斗奪星軫之光芒勢聳乾龍煥雨亷之晶彩增盤谷山泉之重貫豐城干莫之精陽和不擇地而施海宇舉聞風而起兹蓋伏遇皇帝陛下道包萬象天縱多能心上經綸本廣厦細旃之論毫端造化回冰崖雪屋之春凡陪虎觀之清遊隨探驪珠而必獲察臣研精磨鏡之帖憐臣當躬耕隴之勞爰頒肆筆之書下飾窮山之陋臣敢不祇承帝賜仰對天章六字寶傳與六經而俱壽百金産薄期百世以流芳永垂訓于子孫庶酬恩于君父五日到任除右文殿修撰知平江府兼淮浙發運副使謝表伏以班著罔功已斷驅馳之夢麾軺假寵躐升論撰之聯荷帝力之無私感臣生之易老俶臨封境祇布寬條臣中謝竊以行都歷百年以來扶風為三輔之勝內拱京邑固根本以為先外餉長淮峙糗糧為尤急實為表裏之重寄必得文武之兼才伏念臣寡過未能早衰多病曾微片善可為蟠木之容徒有朴忠願效采芹之獻遄逢盛際親簡睿知密司省闥之彌綸進侍細旃之講論而臣才非穎脫識陋管窺大不足以扶植紀綱小不足以變通財計要其本意惟曰弗欺未殫螻蟻之忱俄嬰狗馬之疾祈閒纍疏誤渥自天廣內凝嚴除職密聨于書殿吳門咫尺勉行昭布于奎宸生蒼顔白髮之光煥畫㦸清香之色是非常制允為殊恩祈鎮撫之無難且轉輸之未絶必民與官樂為市乃不孤招糴之名必州視縣如一家乃克全厚下之實惟寬足以革暴惟靜足以彌紛退慙謭能曷稱隆委兹蓋恭遇皇帝陛下陶成庶類器使羣工知臣薦試外庸熟田里艱難之務謂臣曽汚中禁識冕旒憂顧之心賁以新榮責之後效臣敢不俯殫駑力仰答鴻私黃霸務在安民誓將自託汲黯不能任郡終願歸休戊申磨勘轉朝散大夫謝表輔郡承流慚罔功于下考銓曹㑹課誤增秩于中行僥踰六品之升優渥九重之賜祇膺渙汗凛極臨淵中謝伏念臣徒守孤忠曾微顯績日塵班綴病軀久倦於驅馳恩畀麾軺詔㫖弗容於避免䝉潤于京師九重之地繫心於吳門咫尺之天每畢力以支持僅與民而安靜抗疏纍祈于閒散豫環賜被于褒嘉十一等為大夫開唐㦸户二千石有治效沗漢璽書揆積嵗以奚勞乃逢辰而加寵兹蓋伏遇皇帝陛下規恢庶政磨勵羣工獨總權綱內外任分于種蠡公行信賞循良庶得於龔黃線長每務于甄收綿薄亦叨于明陟臣敢不誓堅素履䖍答鴻私名器不假人欲辭榮而未遂謀猷則告后雖歸老以無忘供兵部侍郎職謝表伏以軵居出守已愧罔功禁槖論兵忽叨誤渥宜退而進荷寵若驚中謝竊惟歷代之建官莫重六曹之分職屬時立武尤急司戎調補簡稽總尺籍伍符之衆論思獻納扈屬車華蓋之間必得通才始堪妙選如臣者地寒無挾材窳非長人之有善心好之庶幾寡過少不如人今老矣自揆何能三載巖栖寸心灰冷值改調于化瑟乃首被于招旌由省闥而升列卿侍經帷而攝銓選簡知深厚報稱蔑聞疾久苦于采薪符遽膺於分竹强顔扶憊纍疏投閒望之非雅意於本朝汲黯自不任於治郡豫環屬爾簪筆隨之禮方謹於循墻召弗容于俟駕神武之德廣運固上稟於明謨軍旅之事未聞終難勝於任責或者攸司之清簡正昭大度之優容兹蓋伏遇皇帝陛下剛健乘時威靈及物修車備器將恢內修外攘之功連茹拔茅聿致小往大來之慶故雖不􅈺司馬之法亦許攝登祈父之聨臣敢不興起懦衷對揚休命知軍容萬里歎有忝於儒生舞干羽兩階庶助成于聖化供禮部侍郎職謝表伏以典三有命許汙法從之班共二非才更沗成均之寄承恩激烈揣分凌兢竊嘗考有虞載籍之傳遡盛帝疇咨之意以禮化最關於治本故選掄特重於他官伯作秩宗所以重寅清之任䕫教胄子所以隆溫栗之風茍非其人曷稱兹舉如臣者受才不穎涉世多艱早嘗備省闥之彌綸晚乃侍金華之講論寸長蔑有一念不欺久病支離僅固筋骸之束故書忘廢始知口耳之非守藩屢丐於歸休造闕莫違於威命吹竽戎部叠組儒官涓埃何補於髙深負乘祇慚於玩愒周官六卿分職率屬均參禁密之司禮儀三百待人後行益峻清華之職寵踰其分人謂斯何兹蓋伏遇皇帝陛下器使羣工手提妙造地蟠天際儀文昭煥於兩間魚躍鳶飛德化陶成於萬有不求其備善用其中謂臣粗謹司存姑俾攝承於邦典知臣斷無他技或能勉率於諸生是使妄庸亦叨簡記臣敢不對揚殊渥激勵壯懷屬車華蓋之間誓朴忠之自效稽古禮文之事庶盛際之親逢儻少答於鴻私即願歸於農畝庚寅宰執宣賜御製忠邪辨謝表類别薰蕕正人心之趨向訓垂琬琰覩聖意之宣明回剝窮復反之機導否極泰來之運雲章敷錫風化聿新竊聞忠邪本不相謀是非斷無兩立知人則哲在帝堯猶以為難觀行聽言雖孔子未之能信然疑似之多端易惑而虛靈之方寸莫欺果使清明之在躬何憂黑白之易位欲其論定惟以事觀阿意茍容者必禹光犯顔敢諫者即王魏附伾文則寧復念國忤恭顯則决非為身𢎞也詐而舒也純陸以忠而裴以佞至若和同周比之相悖泰驕義利之不侔氣類各從肺肝如見惟文理密察足以有别如尺寸權衡付之至公兹蓋伏遇皇帝陛下獨運陶鈞更調琴瑟青天白日灼知三宅三俊之心履霜堅冰早置一隂一陽之辨懋緝熙於閒燕取鑒戒於元龜聖謨昭黼黻之光才品惡紫朱之亂警於有位精以承休昔紹興頒戒石之碑諄諄厲節乾道製用人之論凛凛明邪復見祖風大關世道臣敢不㿽嚴三畏堅守四維大哉言一哉心若常近威顔之側有諸中形諸外毋少萌毫髮之欺丙申除直祕閣依舊浙東提刑兼權浙東提舉謝表旨曰昔姚崇之告𤣥宗謂能擇十道按察使則天下不勞而理朕嘗三復斯言以為有國之未大治政繇吏民之不相習使部使者得人則異於是故每出節臨遣必謹之重之非師論允穆者不以授爾挺姿有堅持之操賦政多豈弟之規將漕江東凛有風績肆疇爾庸命爾易節於浙左夫王良造父之鳴和鸞逐水曲罔不中節者人馬相習也爾於使事其知習矣即所以驗於逺者施於近於為政乎何有往哉尚迪時命無違長安日近甫易節於外臺壁府天低復遊班於中祕捧溫綸而有耀覺凡骨之頓輕載惟五星聚奎之祥實啓列聖尊儒之治自端拱崇文之置院逮元豐延閣之錫名寶訓森羅隔人間之風日道山嚴邃矗海上之煙雲入館者榮於登仙寓直者謂之貼職必有淹該之彥始膺殊異之褒伏念臣愚不識時志徒嗜古場屋舉子之作姑以决科瀛洲學士之聨何嘗入夢自驅馳於官鞅愈汩沒於吏塵騖行抱成案而前但箝紙尾螢案照遺編之字久負初心荷洪造之曲憐沗繡衣之直指文書盈於几正虞遍覩之難訟牒裝其懷深覺早衰之遽曽是皇華使臣之在隰亦依青藜太乙之餘光蓋臯陶由稽古以明刑而不疑以通經而斷獄將俾勿忘於素業忍令自絶於清流臣敢不益讀未見之書求為有用之學校讐大祿半生已愧於儒紳講論石渠他日倘承於帝側遺表誥詞云夕拜瑣闈未絶塗歸之筆夜移舟壑驚聞淪謝之言雖百年旦暮之常嘆一代風流之盡爰加愍飭式示寵榮具官某用世通才識時宏蘊其清規可以厲俗其姱節可以尊朝持槖甘泉人稱名從論說東序士得明師朕方興前席渴見之懷爾已遂飾巾待終之願宿儒可備顧問誰其嗣之老成尚有典型今其已矣叠四階之優贈升次對之華稱用書銘旌永賁泉壤生必有死殆猶夜旦之常主爾忘身敢為存亡而改望闕庭而永隔戀軒廄以長鳴假息須臾輸忠萬一臣某悲哽悲哽頓首頓首伏念臣禀資戅直奮跡羈單幼學壯行粗有聞於師友臣忠子孝期無負於君親先皇帝擢之甲進士之科聖天子置之百執事之列弗稱天朝之儀羽敢陪省闥之彌綸建長策遇明時莫禆國論有嘉猷告我后屢觸宸嚴凛冰履之自危揭天光而下照險夷萬變精白一心將指外臺薦被皇華之臨遣守藩右輔更勤細札之趣行計簿未上於甘泉釐席已前於宣室追趨瑣闥密勿經帷夙夜寅清何補禮文之闕日月獻納曷憚侍從之勞而臣福過災生老將疾至精神因之恍惚形骸寖以支離危衷未動於矜憐孤迹迄煩於全護要藩華職有光出晝之行間館珍臺徐賦祝釐之祿冀專精於藥石或收效於桑榆去國兩年扣閽纍疏骸骨之乞弗遂膏肓之疾已深非敢私螻蟻之微所愧乏犬雞之報心勞形瘵知無路以更生血瀝肝披願有言於將死伏願皇帝陛下清心寡欲明目達聰昭德以照百官益嚴紀律撫辰而凝庶績罔忽幾微定國本以建久安之基肅朝綱以杜旁落之徑使聖治謹終而猶始則大邦雖舊以維新臣語短意長形留神往威顔益逺持荷空想於前塵王愾未忘結草尚希於後效清正存稿卷三
