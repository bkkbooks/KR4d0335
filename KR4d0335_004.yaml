body:
  text: 清正存稿卷四宋徐鹿卿撰講章八月戊寅進講尚書讀九朝通略通鑑綱目禹貢梁州一段云臣聞帝王之學與經生學士異非區區從事於章句訓詁而已讀禹貢一書當知古人所以為民除患者如此其勞疆理天下者如此其廣立法取民者如此其審尊所聞行所知不至於古不止也載惟我宋以仁得天下版圖之舊兼九州而盡有之南渡至今所存者獨揚荆梁三州至徐則僅存一二昔漢光武披輿地圖喟然嘆曰天下郡邑如是今始得其一陛下聖學髙明能無興念及此乎且古之梁今之蜀也乾德下蜀之初天戈一麾列城按堵數十年間三關為夷塗劍閣為平地生靈為魚肉文物為灰埃士無歸宿之鄉民無安集之所兵革之患慘於洪水感時思古撫卷長歎安知無如鄧艾裹氊之謀乎安知無如逆曦猖狂之計乎惟能以光武之心為心則雖盡復禹績有不難者而於保蜀乎何有十二月戊辰進講卷子論五子之歌其一曰至雖悔可追云臣觀此歌五章文義首尾相續一章二章雖止於詠述皇祖之訓而太康之失不可掩矣三章四章若曰纍朝都邑之盛如此前人典章治具之懿如此今以不守先訓之故皆不能保是誰之罪歟五章則敘其顛沛無依之狀若其過在已而無所自容者一何溫厚感惻之深耶因是論之三聖相承先後一意曰可畏非民曰非衆罔與守邦曰四海困窮天祿永終而欽哉一語乃其傳心之密旨禹之所以訓子孫即堯之所以告舜舜之所以告禹者也大凡敬心肆心不能兩立此長則彼消此入則彼出治亂之端於是分焉惟其敬故真見民之可與守邦真見民之為邦本真見民之可畏可近真見民之不可虐真見民之能勝豫雖兢兢業業猶懼不蔇矧敢自暇逸以縱其欲乎惟其肆故以聲色遊田為可樂而民之勞擾不恤也以飲食宫室為可侈而民之寒餓不顧也方其未見也民之怨氣滿腹而不知圖及其既見也覆宗絶祀而悔無及夫以纍聖久安之天下太康一溺逸遊之好其禍且如此况事變轇轕人情憂危之時乎噫為人上者奈何不敬臣請為明主再三誦之癸未進講卷子論湯誓至罔有攸赦云臣聞聖人之心天而已矣故觀聖人處天下之變不于其迹而于其心升陑之師何以見湯之心哉方其起伊尹於畎畝之中聘幣三往而不憚豈無故而然耶尹之幡然而改也亦曰使君為堯舜之君使民為堯舜之民則君臣之意固有在矣湯之拳拳於尹如此及其至也乃使之就桀蓋謂桀之惡念已極惟尹庶幾能回之想其適夏之際所以開陳堯舜之道敷繹皇祖之訓者無所不至必將曰德不可滅威不可作也民不可勞財不可聚也一往而不可則至于再再往而不可則至於三四五湯之所以望桀者何如哉及其五反而卒不悟則天意可占矣然後伐夏之謀定豈湯之得已乎商之民日涵泳乎湯之仁而夏之民不得以同其仁非天意乎商民之所見者私於一國湯之所見者公乎天下此湯之所以無間於天也雖然動以天矣而猶曰有慚何哉蓋君臣天地之大義不可犯也一有小異則其心自有不安焉者矣善乎先儒之言曰非有桀紂之暴湯武之仁君臣之義當守節伏死而已臣既明湯之心復援此以曉天下之為人臣者手記云讀通略開寶二年六月及十月至段思恭知靈州奏曰古人皆以事業進身自科舉法行寒士舍此無以自進自成童而上即弊心力於場屋不切之文遂至臨事輒敗馮繼業守邊自謂非己不可太祖一用段思恭果能稱職自此邊將豈復敢肆其驕哉今邊方為繼業者多矣惟陛下稍革科舉之弊以事功責天下士亦何患無思恭哉己未進講卷子論禹貢雍州一段云臣聞開闢以來洪水為天地間最大患天生神禹出而當之非於大綱領所在卓然有見足以御夫滔天方來之勢則雖殫智慮窮心力彼湯湯浩浩者將不勝其治矣禹蓋深察乎此者故其言曰豫決九川距四海濬畎澮距川此所謂大綱領故自雍一州而觀則渭為大既導渭以入河則涇可使屬于渭漆沮可使從于渭灃水可使同于渭大有所入則小有所歸用力省而成功博矣合九州而觀則海為大川次之能決九川以達於海則濬畎澮而至於川亦易矣聖人所以禦大災扞大患者其所識者大也人主之治天下亦然當衆弊轇轕之餘而聖明適當其會轉移闔闢果將奚先任洪碩以總機務而大臣舉四方萬里之治屬之於監司郡守擇威望以專閫寄而帥閫以扞敵禦侮之功責之於列屯守將選通才以主邦計而版曹以理財正辭之事分之於司農外總絲牽繩聨領挈裘順是亦使畎澮達川九川至海之智也不然役役於常程細務之間而綱領所在不深致意則自處者小矣何以障大勢之趨乎臣敢於九州之末備論禹所以治水之道而終之以言曰智者若禹之行水冬十月壬戌進講卷子論禹貢導山四條云臣觀禹貢一書載禹治水曲折既以九州之山川各附其境又總導山導水而聚見於其後互相發明而施工之次第畢見矣王肅則有三條之説岍為北條西傾中條嶓為南條鄭玄則有四列之説岍為正隂列西傾次隂列嶓為次陽列岷為正陽列而先儒朱熹以為不然蔡沈祖其意以兩導字分為南北二條而江河以為之紀於二之中又分為二導岍以下為北條大河北境之山西傾以下為北條大河南境之山導嶓以下為南條江漢北境之山岷山以下為南條江漢南境之山其説最為坦明今參合而觀則導岍以至大嶽即冀州壺口至嶽陽之役也底柱以至太行即冀州覃懷衡漳之役也西傾以至太華即雍州終南至鳥鼠之役也熊耳以至陪尾即豫州伊洛瀍澗與導淮之役也導嶓至大别即梁州導漢之役也岷山至敷淺原即梁州導江之役也禹之治水其條理秩秩如此人主之治天下其可不知本末先後之序哉乙丑進講卷子論禹貢導水九條云臣聞中國山水皆來自西北故隨山始於岍岐濬川始於弱水隨山所以觀其勢濬川所以導其歸其實先隨山而後可以濬川也疏導之功既於各州見之至此又隨其流𣲖而條列之所以互相發也其間山川地理之名非親見目擊不過誦師傳按傳注非可臆斷至其大義之可以為法為則者臣請得而詳言之夫百川皆東而弱水獨西黑水獨南其源又皆在塞外禹隨其勢而先導之欲西者西欲南者南然後併力於冀兖諸州之水自導河以下大抵皆東流矣人主觀之則知為治之道亦惟行其所無事而已也礙者鑿之壅者決之當因者修之當止者滙之當分者播之當合者同之而一無容心焉人主觀此則知隨時弛張之道有不容以執一也川流浩渺若不勝其用力然或入於南海或東入於海或入河以至於海其得所歸則一爾人主觀此則知為善不必同而歸於治則一也雖然是有本焉程頥曰有關雎麟趾之心而後可以行周官之法度臣亦曰有大禹思由己之心而後可以考禹貢之法度乙酉進講卷子論禹貢九州攸同至成賦中邦云臣聞禹貢紀禹治水之書也而以貢名何哉夫以四海九州之廣而戴一人焉以為君為其能興利除害而生育乎我也其尊君親上之心每因貢賦而見方洪水之初斯民自保之不暇又安知所謂奉上之禮哉及水患既平六府既修於是而制田賦於是而獻方物在上者盡其仁在下者致其敬蓋必如是始可以言功成治定之懿矣此名篇之本旨也然聖人之心惟恐一毫之屬乎民以庶土交相正則知所産之不可以槩同以三壤相凖則則知所賦之不可以偏重而成賦止於中邦則知貢獻之在夷狄者不可以或強其致謹一意乃所以為制貢之本使人易供而樂輸也後之取民者其鑒於兹手記云讀通略乾德六年至張洎能伺國主顔色奏云臣聞舜好問而好察邇言而惟邇言是聽惟邇言是爭詩人以為戒説者謂邇言為近習之言要知凡親密者之言皆是天下惟親密之言最難察其譽是人也不直致其譽之之詞必委曲以助之其毁是人也不直致其毁之之詞必浸潤以入之人主不察而墮其術中則黑白混淆是非倒置張洎善伺候國主顔色所以自誦其一門榮寵之盛而翻然引退者是必隂覺唐主有厭之之意而假是以固其寵也至於薦湯悅為相亦必其私相朋比之人未幾復召未必非悅為之助而唐主已入其中而不悟也十一月乙未進講卷子論禹貢錫土姓至告厥成功云臣聞聖人一身天地民物之宗主也一事之未理一害之未除一物之未遂皆聖人責也方堯之時洪水橫流天不得其所以成下民其咨昏墊而不得其所以安其為患何如哉禹以身任胼胝之勞大而山川鬼神莫不寧小而鳥獸魚鱉莫不若水土平矣貢賦定矣五服建矣道化行矣八九年間建如此大功業去如此大災患定如此大經制闢如此大風教禹豈自以為有餘哉僅足以塞宗主天地民物之責而已陛下聖德髙明不下大禹然臨御二十二年視禹告成之時不翅過倍而國本未建邊境驛騷財計空虛人民離散盜賊竊發幾無一事卓然植立者是必有其故也讀聖人之書當以聖人為法臣願陛下謹思之勉圖之手記云讀綱目晉安帝隆安三年至燕主盛遣李旱討李郎旱既行急召而復遣之郎聞旱還謂有內變不復設備奏云急召復遣此乃兵機所以疑李郎也既中其計故至於敗至帝即位以來內外乖異石頭以南皆為荆江所據以西皆豫州所專京口及江北皆廣陵相髙雅之及劉牢之所制朝政所行三吳而已及恩作亂八郡皆為恩有奏云此一節臣願陛下反覆玩繹因再讀一過奏云陛下試觀今日大勢得無有類此者乎尾大不掉已有其象不審陛下與二三大臣曽圖慮及此否癸卯進講卷子論甘誓至豫則孥戮汝云臣聞君臣天地之大義也古者於其臣一不朝則貶其爵再不朝則削其地三不朝則六師移之未聞以戰言也周桓王失政與鄭戰于繻葛春秋猶書曰王伐鄭今序書既曰與之戰而史之所書又曰與之大戰則扈之不臣亦甚矣啓繼承之初驟當大變乃能親帥六師以討犯分之諸侯其誓師之辭雍容整暇峻發明厲而天冠地履之義昭然若揭日月此可以見啓之賢真能繼禹之道矣然方是時綱常素正朝廷素尊猶有如扈之負固者後世人主其于防微杜漸之道可不謹乎漢至文帝七國之禍萌象已著使用賈誼分王子弟之説亦可以濳殺其勢而養癰護疽至景帝而大決猶幸當時元臣宿將遺烈尚存南北軍與郡國之兵皆百戰之餘尚有可恃不然殆矣若唐天寶以後藩方跋扈賞罰自専官屬自置貢賦自私而天子之尊至於無人無兵無財憲宗宣宗威令甫振而復弛積而不已遂以亡唐又豈特君臣交戰之比哉由辨之不早辨也恭惟藝祖皇帝風雪之夜君臣從容杯酒之傾神領意會一語之契消除五季之禍根扶植萬世之綱常此我宋家法也聖子神孫所以斡旋宇宙闔闢萬變而消患于未形者可不於此致深長之思戊申進講卷子論五子之歌至以作歌云臣聞國之興衰在民民之離合在德聚則為君臣散則為仇讐甚可畏也蓋君民之心同一德爾君以憂勤為心則其德日彰而有以感動乎民心故聚而成國君以佚豫為心則其德日亡而反以拂戾乎人心故散而為仇天位之艱如此太康常一念及此乎皇祖之所以畀付者何如而乃尸其位四海之所以屬望者何如而乃安于逸太康有是德而自滅之民心安得而不二哉不此之懼方且盤遊無度其逺至於有洛之表其久至於十旬弗反此固羿之所為窺伺也大抵姦臣賊子雖有不肖之心未有無因而動者漢文帝仁孝恭儉人心愛戴如父母七國雖強何名而敢為亂唐玄宗驕奢淫佚不恤國事安祿山遂得投隙而稱兵是知離天下之心生姦雄之心皆自人主之失其本心始逸遊之樂所得幾何而敗亡之禍貽笑萬世古稱以一人治天下不以天下奉一人君國子民者慎毋快耳目之欲而為姦雄之所因哉復奏乞宸翰云臣生長寒士誤蒙陛下許侍經幄恭覩陛下多能天縱肆筆成書昭回之光下飾萬物凡臣子祈恩望賜者無不滿意而去臣於誦説諸臣最為末至本不當冒昧有請然臣有目眚度不能久事陛下失今不言恐如入寶山空手回也伏念臣一廛四世僅庇風雨有閣曰味書有堂曰遺安欲望睿慈賜臣二扁使得藉手歸見松菊實拜天地之賜冒犯天威臣下情無任皇懼之至甲寅進講卷子論仲虺之誥至舊哉云臣觀堯舜揖遜之風去夏商未逺也而湯反之當其初時桀之凶德熾矣斯民陷溺於塗炭不容一朝居也湯使伊尹五反五就亦庶乎桀之能覺矣桀既不悛民怨益甚湯不得不為應天順人之舉其心蓋有所甚不忍也既已為之矣然唐虞之事如彼今日之事如此後世必將曰湯至聖也而猶為之則是啓盜賊之門紊君臣之綱自我始也於是忸怩愧恥無以自容然天下之所望湯者豈徒曰勝夏而已其康四海而垂萬世者植基培址正在此時使湯而不以為慙也何以為湯使湯纍於慙而不能自廣也亦何以慰天下之望故仲虺所以開釋其意一則曰天之所命不可違也二則曰商見惡於夏不容己也三則曰湯德在民不可辭也四則曰民望所歸不可遏也天人之責在湯湯豈必留此慙於胸中久而不化以傷維新之政哉凡此皆所以消釋湯不自安之意也然仲虺終不敢以為無慙者亦足以見天冠地履之義凜乎不可犯矣此仲虺言外之意甲子進講卷子論仲虺後段云臣觀此篇前五節皆釋湯自慙之心後三節皆勉湯當為之事蓋人主一心萬事之根本也此心如明鏡如止水則虛靈澄湛軒豁恢廣以之運量酬酢無事不可為一有繫纍則芥蒂凝滯如鏡之塵如水之波安能有所立哉湯既勝夏凡所以昌其國懷萬邦裕後昆保天命者皆在此時皆在此心任責重大有無疆之休亦有無疆之恤今乃留一點慙忸於胸中久而不化以傷維新之治始既不謹終無可觀此正虺之所深懼故先有以釋其慙後有以勉其進自佑賢以下皆其事也至於一篇之要旨則全在德日新之一辭蓋是德運而不息則其用久而不窮不然則慙已化矣而滿心乘之慙則此心慊而有所纍當為者不及為滿則此心泰而有所止可為者不復進以湯之聖固非自滿者然臣子責難之言備精粗該本末不得不如是也盤銘曰德日新日日新又日新此湯因所得於虺者而推廣之也能自得師者王諒哉後之明主其可不以湯為師戊辰進講卷子論伊訓前一段云臣聞人主之繼述莫嚴於初成湯所以貽謀創始者其德至矣由之則治違之則亂太甲即位之始乃宗廟神靈之所顧歆羣臣萬民之所觀聽能嗣厥德在此時不能嗣厥德亦在此時欲占他日之治亂惟觀太甲之能嗣與不能耳人心同此愛也吾能盡吾事親之孝以立其愛人心同此敬也吾能盡吾事長之禮以立其敬即此一念充而廣之由今日至於後日益廣益大益逺益著則始於家而刑於國以極於四海莫不知所愛敬而湯德為不墜矣不然無諸已而欲求諸人不能謹其始而欲責其終是已且不立而欲立人乎哉故謹初者嗣德之要也立愛立敬者謹初之要也雖然始之不善未有能善其終者矣而善始而不克終者亦豈少哉漢武帝唐玄宗是也伊尹曰今王嗣厥德罔不在初臣請繼之曰今王全厥德罔不在終講畢奏云善始固難克終尤難詩云靡不有初鮮克有終如漢武帝唐玄宗晉武帝之流初年非不可觀一念少差貽害天下貽笑千古惟本朝仁宗髙宗孝宗在位最久終始一心度越前代陛下春秋鼎盛加之世道艱屯丙午丁未人多疑為厄運臣願陛下日新又新日謹一日上畏天命下畏民碞則治平之懿當與三聖齊休而儷美矣癸未進講卷子論伊訓後一段云臣謹按伊訓之書始言桀失天下之易次言湯得天下之難次言前人之垂憲者為必當守終言天命之難保者為必當畏而又咨嗟歎息唤醒太甲而告之曰嗣王祗厥身念哉此正一篇之要旨喫緊用力處也蓋雖有如是之良法如是之謨訓而吾身本原之地一不加敬又安能御於家邦而對於前人哉想是時太甲雖煢煢在疚而縱欲之端尹固有以密察之故思有以遏其萌而杜其微此大人格心之學也雖然太甲中才之君伊尹所以望之者猶不敢恕若夫臣子遭值聖明則責難之義又當何如哉臣嘗即惟德罔小惟不德罔大之言而推廣之曰舞不必常歌不待酣但逸樂之間微有失節非祗也不必孜孜貨色不必旦旦遊畋但苞苴之蹊一線未絶燕安之鴆一息不警非祗也聖言雖不侮而亦未達於用忠直雖不逆而亦未見於行耆德雖不逺而私議或在于王宫頑童雖不比而異服或汙於宫禁皆非所謂祗也災祥之判治亂之分不在天而在身不在著而在微嗚呼敬之哉敬之哉戊寅進講卷于論咸有一德前一段云臣按自伊訓至咸有一德皆伊尹訓太甲之辭而時有先後語有淺深其節凡四奉嗣王祗見厥祖明言烈祖成德以正其初其辭雍容不迫此一時也至於王惟庸罔念聞則戒以無忝厥祖戒以無越厥命以自覆戒以無俾世迷辭愈切此又一時也及其悔艾深至始告以升髙自下陟逺自近蓋直告以用功下手處此又一時也洎復政告歸然後以精微傳心之蘊空臆而盡言之而名之曰一不憤不啓不悱不發涵揉切磨具有次第而其大要則不出此一而已何謂一曰運行而無息純粹而無雜貫通而無間莫非一也而有常則大體焉合而觀之則德在初者此一之基也慎乃儉德者此一之修也允德協于下者此一之充也至於此篇曰常德又曰庸德則知其不容息也曰德惟一又曰德二三則知其不容雜也曰天佑民歸曰吉凶災祥則知其不容間也諄詳懇到愈精愈密其意蓋以嗣王克終允德固萬世無疆之休然師保既歸而寒之者至則有時而不常矣不常則前日之功間斷而不續不可以言一矣是善始易慎終難作聖作狂一念間爾君天下者可不戒哉辛酉進講臣聞人主之學與經生學士異執經入侍者必有以發明正理開啓上心然後可以無愧所學訓詁云乎哉抑誦説云乎哉四牡一詩為勞使臣作也生民休戚係所遣之是非官吏臧否觀於使者之得失不難於勞而難於遣周人於此何其慎重之至而不敢茍哉方其行也則寵以禮樂之華勉以咨諏之寄及其還也則又述其勞勩不遑暇逸之勤而念其思親思家之意歡欣悅懌常浮於言意之外臣子奔走於原隰阪險之間而微勞片善坐見於黼座蜵蜎之邃何其盡人之情記人之功纖悉至到若此易曰説以使民民忘其勞臣子寧有見知而不説以忘勞者哉王澤既微古意漸盡遣者既茍勞者亦廢往往朝辭禁門情態即異暮宿州縣威福便行才有尺寸之權可以藉手則無非毒民厲衆之事既不知所以遣之借曰勞之亦徒以為欺而不足以為惠矣今宜追倣古意嚴于遣而勞行焉我朝盛時鮮于侁嘗使京東既又再使司馬光嘆曰一道福星也安得百子駿布在天下乎由今而言一遣已病况再乎一人已多况百乎張詠守金陵范延貴一殿直爾詠問天使沿路曽見好官員否延貴曰昨過袁州萍鄉邑宰張希顔者雖不識之知其好官員也問其故曰驛舍橋道全葺田萊墾闢野無惰農肆無賭博市易無喧爭夜宿邸中更鼓分明是知其必善政也詠笑曰希顔固善矣天使亦好官員也即日同薦於朝古道既薄上下往往交相為愈有採訪人物於一殿直如詠者乎有天使過邑而縣宰不識者乎是可嘆也雖然臣豈敢謂今世遂無其人哉精遣而後勞之是在陛下一轉移間爾癸巳進講臣觀遣勞使臣之詩二篇相為首尾臣于前篇言當遣而後勞蓋以遣重於勞也夫使臣之職惟以詢訪為先務人主以求賢自輔為心則可以自廣其聰明人臣以訪善報君為心則可以輔成人主之德意將命而行靡不周遍四方萬里皆如在畿甸之間斯謂為不辱君命矣然嘗觀春秋傳穆叔之言曰訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀雖各有意然皆欲其訪求善道同歸于正而已夫茍正直恭儉不以言則非咨善矣人倫天倫不以明則非咨親矣孝弟忠信不以白則非咨禮矣田里愁歎不以聞則非咨事矣水旱盜賊不以達則非咨難矣志不在于善道而以摘發隱伏為能以浮言單辭為信以欺誑生事為心則臣恐壅上德賊生民將自遣使始豈周人詢謀之本旨哉惟明主重之丁卯進講卷子講常棣至蒸也無戎云臣觀此詩八章説者皆知其欲篤於兄弟固也然不察詩人起興之本旨則猶未足以言詩也夫一篇之中所興者二以常棣興則見其衆多相輔一氣同枝自相親倚非有假於外者天性也以脊令興則見其飛鳴動搖出於至情不能自舍非有所待於人者亦天性也知二章之所以興則其餘六章之義可識矣蓋兄弟天倫也天理不可泯則兄弟不可離是皆自然而然動於中而不容己者周公閔二叔而誨之使非本諸固然之天以感發其至性則雖欲強為糾合庸可得乎若餘章不過反覆鋪陳使知是理之不可不深體而有以見凡今之人皆莫有過於兄弟者也何以明其然哉死亡之可哀惻然懷思而致其情者兄弟也急難之不料樂於叶力而盡其助者兄弟也外侮之侵凌相與扞禦而不敢避者亦兄弟也皆所以深言兄弟之不可及也至於他人則雖有矜憫之情逮勢力稍不及則有相視長歎息而已矣利害稍相涉則有逺避不敢近而無復致其力者矣天真所存其可誣哉臣故首及之以發詩人之本旨云口奏云司馬牛憂曰人皆有兄弟我獨亡牛有兄弟而言亡慨然形於傷嘆如此必其心大有所感動者然則天理人心之際凡有似此者豈得不惻然興懷哉冬十一月己卯進講卷子論常棣至末章云臣觀上五章皆反觀展轉以致其情言兄弟至親不可暫離而終可托可恃者以其為天屬故也所謂出於天之本然者也至此則又反其言辭世俗既降方喪亂則思兄弟及安寧則懷友生是謂於所厚者薄而失其本心矣因是心而糾合之誰能不自反乎既又為之旁證曲喻以盡其情飲燕樂矣然非兄弟皆至則其樂不足慕妻子好合如鼓瑟琴樂矣然非兄弟翕合則其樂不能深久樂至於可慕可久皆由兄弟而後致則知兄弟信非他人之可及也然自二叔之變雖以至親且日以衰薄推而至於九族則薄益甚矣其曰謂他人父謂他人母謂他人昆是乃失其本心糾合之道若止以言辭諭之未必信其然也又謂宜室家樂妻孥而後兄弟之情可久試究竟而深圖之其道豈不信然哉周公親親之心於此可謂至矣然有不幸而遇天理人倫之變者宜何如哉象之於舜是自絶於天者也孟軻乃曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已臣以為親愛之迹或有所不能及而親愛之理則不可一日忘此念一存則一家仁一國興仁矣此舜之所以與天合也惟聖明念之己亥進講卷子講伐木一篇云臣竊觀周之盛時所以治安千百歲而不可拔者正以大綱小紀詳法略則足以為後世憑藉扶持之計故也其後小雅盡廢至於蕩蕩無綱紀文章卒至於徒擁虛名而國非其國矣今聖祖神宗精神心術之所建置􅌨風沐雨之所經營者至於近年百度浸已廢墜不舉所恃以為安者僅有纍世仁厚一脈而四牡之君臣常棣之兄弟伐木之朋友故舊所謂建三綱以為綱立五常以為常猶幸無恙爾若鹿鳴皇華天保采薇出車杕杜魚麗南陔白華華黍由庚嘉魚崇丘南山有臺由儀蓼蕭湛露彤弓菁莪之類或荒茀而不修或廢壞而不復而上安下恬視為不切慮不動於耳目幾何而不至於小雅盡廢哉扶持修飭要當汲汲而圖之臣以為當自君臣朋友兄弟凡有關於綱常之大者先致意以明其本而以忠信孝弟亷恥禮義諸詩相與修輔而維持之則小雅庶幾可以漸復矣此乃緩而實急者惟聖明深念之戊辰進講卷子講天保一篇云臣觀此詩自三章以前皆以天保定爾為首蓋言天之所以保安於君者無一不至且進進而未已山川之髙深岡陵之廣大日月之光明松柏之茂密皆未足以形容其福之盛至若四時豐潔酒醴以事其先王先公者神亦降之福而神之來格者皆詒爾以福斯民質實無為但日用飲食而已言羣黎百姓皆助爾而為福也至此則天地兩間山川鬼神莫不錫之福此固天之所保定於我君之本旨也雖然天之錫福於君者如此則君之所以受福於天者固無窮矣然臣竊謂君之所以自求多福者猶有在焉仰體列聖仁厚之意則生不傷厚不困者一念不可忘也深察內外是非之分則進忠厚退浮薄者一事不可忽也天下之事固衆矣是二者尤為集福之本臣請得終言之十二月乙未進講卷子講采薇一篇云臣竊謂興兵動衆人情之所甚難也茍無其道尚安能強之必我從哉易之兌曰説以使民民忘其勞説以犯難民忘其死説之大民勸矣哉然後知古人使民輕於犯難者以明夫説之道也故遣使之詩必先使天下曉然知用兵非我之本意又為備述其勞勤困苦之狀如親履其地而親見其事雖曰託諸戎役之自言而實則以明我之深察其情也其有不説以犯難而忘其死者哉此可以觀詩人體物之心矣清正存稿卷四
